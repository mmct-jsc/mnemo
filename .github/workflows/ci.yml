name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PRs cancel their own in-flight runs; main always finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

# The MiniLM model loads local-first (zero network when cached). The env
# points every job at one workspace-relative cache dir that actions/cache
# persists per runner; xet is disabled and downloads get a hard timeout so
# a throttled HuggingFace Hub FAILS FAST instead of stalling (a stalled
# download once hung the integration job for 1h38m).
env:
  MNEMO_MODEL_CACHE_DIR: ${{ github.workspace }}/.mnemo-model-cache
  HF_HUB_DISABLE_XET: "1"
  HF_HUB_DOWNLOAD_TIMEOUT: "60"

jobs:
  # --- 1. Lint + format --------------------------------------------------
  lint:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: daemon/uv.lock
      - name: Install dev deps
        working-directory: daemon
        run: uv sync --extra dev
      - name: ruff check
        working-directory: daemon
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: daemon
        run: uv run ruff format --check .

  # --- 2. Unit tests across Python versions -----------------------------
  unit:
    name: unit (py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: daemon/uv.lock
      - name: Cache MiniLM model
        uses: actions/cache@v6
        with:
          path: .mnemo-model-cache
          key: minilm-l6-v2-${{ runner.os }}-v2
      - name: Install (Python ${{ matrix.python }})
        working-directory: daemon
        run: uv sync --extra dev --python ${{ matrix.python }}
      - name: pytest unit
        working-directory: daemon
        run: uv run pytest tests/unit -q

  # --- 3. Integration tests (real model, cached) ------------------------
  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: daemon/uv.lock
      # NB: the cache path matches MNEMO_MODEL_CACHE_DIR (workspace-relative).
      # The old ~/.claude/mnemo/cache path never matched the test fixtures'
      # per-run tmp dirs, so every run re-downloaded from the Hub.
      - name: Cache MiniLM model
        uses: actions/cache@v6
        with:
          path: .mnemo-model-cache
          key: minilm-l6-v2-${{ runner.os }}-v2
      - name: Install
        working-directory: daemon
        run: uv sync --extra dev
      - name: pytest integration (skips manual-only spawn test)
        working-directory: daemon
        run: uv run pytest tests/integration -q

  # --- 4. Cross-platform sanity (macOS + Windows) -----------------------
  cross-platform:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: daemon/uv.lock
      - name: Cache MiniLM model
        uses: actions/cache@v6
        with:
          path: .mnemo-model-cache
          key: minilm-l6-v2-${{ runner.os }}-v2
      - name: Install
        working-directory: daemon
        run: uv sync --extra dev
      - name: pytest unit
        working-directory: daemon
        run: uv run pytest tests/unit -q

  # --- 5. Plugin scaffold validation ------------------------------------
  plugin:
    name: plugin manifest + hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate plugin.json + marketplace.json + hooks.json
        run: |
          python <<'PY'
          import json, sys
          from pathlib import Path
          mf = json.load(open('.claude-plugin/plugin.json'))
          mk = json.load(open('.claude-plugin/marketplace.json'))
          hk = json.load(open('hooks/hooks.json'))
          errs = []
          # hooks/hooks.json is auto-loaded by CC; referencing it in the
          # manifest too causes a duplicate-load failure. So the file must
          # exist and the manifest must NOT point `hooks` at it. Also: no
          # fictional `platforms` key (the pre-v5.24.0 bug that broke hooks).
          if not Path('hooks/hooks.json').is_file():
              errs.append('hooks/hooks.json missing')
          if mf.get('hooks') == './hooks/hooks.json':
              errs.append('plugin.json must NOT reference the auto-loaded ./hooks/hooks.json')
          if 'platforms' in json.dumps(mf):
              errs.append('plugin.json must not use the fictional `platforms` key')
          # marketplace.json: single-repo plugin installable as mnemo@mnemo
          p = mk['plugins'][0]
          if p.get('name') != 'mnemo' or p.get('source') != './':
              errs.append('marketplace plugin must be mnemo with source "./"')
          # hooks.json: nested shape, each event routed through `mnemo hook <event>`
          for event in ('SessionStart', 'UserPromptSubmit', 'PostToolUse'):
              cmds = [h['command'] for e in hk['hooks'][event] for h in e['hooks']]
              if not any(c.startswith('mnemo hook ') for c in cmds):
                  errs.append(event + ': must invoke `mnemo hook ...`')
          if errs:
              print('INVALID:\n  ' + '\n  '.join(errs)); sys.exit(1)
          print('plugin packaging OK')
          PY

  # --- 6. End-to-end smoke on synthetic memory --------------------------
  smoke:
    name: e2e smoke (synthetic memory)
    runs-on: ubuntu-latest
    needs: [lint, integration]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: daemon/uv.lock
      - name: Cache MiniLM model
        uses: actions/cache@v6
        with:
          path: .mnemo-model-cache
          key: minilm-l6-v2-${{ runner.os }}-v2
      - name: Install
        working-directory: daemon
        run: uv sync --extra dev
      - name: Seed synthetic memory
        run: |
          mkdir -p "$HOME/ci-claude/projects/test-project/memory"
          cat > "$HOME/ci-claude/projects/test-project/memory/feedback_test.md" <<'EOF'
          ---
          name: ci-rule
          description: a clear and unique benchmark rule about XYZQ7
          type: feedback
          ---
          Body: never put XYZQ7 in production.
          EOF
          cat > "$HOME/ci-claude/CLAUDE.md" <<'EOF'
          # CI Global memory
          - rule: prefer terse responses
          EOF
      - name: Ingest + embed + query
        working-directory: daemon
        env:
          CLAUDE_HOME: /home/runner/ci-claude
        run: |
          uv run python <<'PY'
          from mnemo import ingest, paths, retrieve
          from mnemo.embed import Embedder
          from mnemo.store import Store

          store = Store(paths.db_path())
          embedder = Embedder()
          ingest.register_default_sources(store, paths.claude_home())
          report = ingest.reindex(store, embedder=embedder)
          assert report.added >= 1, report
          assert report.errors == [], report.errors

          # The unique 'XYZQ7' token should pin the synthetic node as top-1.
          result = retrieve.query(store, embedder, "XYZQ7 production", k=3)
          assert result.hits, "no hits for XYZQ7"
          top = result.hits[0]
          assert "ci-rule" in top.name or "XYZQ7" in (top.description or ""), (
              f"top hit is {top.name!r} / {top.description!r}"
          )
          print("e2e OK:", top.citation)
          PY
