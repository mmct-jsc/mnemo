<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    mnemo v5.3.0 grab cursor (draggable surfaces in their idle state).
    Same C1 halo + ring as the default cursor, with four outward
    chevrons signalling "drag in any direction". Hot spot center
    (16, 16). Accent #7ee7e0.
  -->
  <circle cx="16" cy="16" r="10" fill="rgba(126, 231, 224, 0.10)"/>
  <circle cx="16" cy="16" r="6" fill="rgba(126, 231, 224, 0.18)"
          stroke="#7ee7e0" stroke-width="1.5" stroke-opacity="0.9"/>
  <g fill="none" stroke="#7ee7e0" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 4 l-2.2 2.2 M16 4 l2.2 2.2"/>
    <path d="M16 28 l-2.2 -2.2 M16 28 l2.2 -2.2"/>
    <path d="M4 16 l2.2 -2.2 M4 16 l2.2 2.2"/>
    <path d="M28 16 l-2.2 -2.2 M28 16 l-2.2 2.2"/>
  </g>
</svg>
