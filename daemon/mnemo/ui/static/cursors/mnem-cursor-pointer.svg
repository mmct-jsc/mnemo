<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    mnemo v5.1.1 themed pointer cursor for interactive targets
    (links, buttons, summary, the architect pill, etc.).
    Brighter accent (#a5f0eb, the C1 accent-hover) plus a thicker
    ring and a wider halo make the affordance visually distinct
    from the default cursor. Hot spot still center (16, 16).
  -->
  <circle cx="16" cy="16" r="13" fill="rgba(126, 231, 224, 0.18)"/>
  <circle cx="16" cy="16" r="8" fill="rgba(126, 231, 224, 0.32)"
          stroke="#a5f0eb" stroke-width="2"/>
  <circle cx="16" cy="16" r="2.5" fill="#a5f0eb"/>
</svg>
