<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    mnemo v5.3.0 progress cursor (busy / loading / Mnem-is-thinking).
    Center dot + four satellite dots around it (the "Nebula" feel —
    the dots stay static; browsers add their own progress-spinner
    overlay where supported, which combines into a layered busy
    indicator). Hot spot center (16, 16).
  -->
  <circle cx="16" cy="16" r="10" fill="rgba(126, 231, 224, 0.10)"/>
  <circle cx="16" cy="16" r="6" fill="rgba(126, 231, 224, 0.20)"
          stroke="#7ee7e0" stroke-width="1.5" stroke-opacity="0.9"/>
  <circle cx="16" cy="16" r="1.5" fill="#7ee7e0"/>
  <circle cx="16" cy="5"  r="1.2" fill="#7ee7e0" fill-opacity="0.95"/>
  <circle cx="27" cy="16" r="1.2" fill="#7ee7e0" fill-opacity="0.7"/>
  <circle cx="16" cy="27" r="1.2" fill="#7ee7e0" fill-opacity="0.5"/>
  <circle cx="5"  cy="16" r="1.2" fill="#7ee7e0" fill-opacity="0.35"/>
</svg>
