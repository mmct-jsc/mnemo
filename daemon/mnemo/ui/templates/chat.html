{% extends "base.html" %}
{% block title %} - chat{% endblock %}

{% block content %}
<section class="chat-shell" x-data="chatPage()" x-init="init()">
  <!-- left rail: conversations -->
  <aside class="chat-rail">
    <button class="primary chat-new" @click="newConversation()">+ New chat</button>
    <ul class="chat-convs">
      <template x-for="c in conversations" :key="c.id">
        <li :class="{active: c.id === activeId}" @click="openConversation(c.id)">
          <span class="cv-name" x-text="c.name"></span>
        </li>
      </template>
    </ul>
  </aside>

  <!-- centre: the thread -->
  <main class="chat-thread">
    <div class="chat-log" x-ref="log">
      <template x-for="m in messages" :key="m.key">
        <div class="msg" :class="'msg-' + m.role">
          <div class="msg-role" x-text="m.role"></div>
          <template x-if="m.role === 'tool_call'">
            <details class="tool-call">
              <summary x-text="'calling ' + (m.content.name || 'tool')"></summary>
              <pre x-text="JSON.stringify(m.content.args || {}, null, 2)"></pre>
            </details>
          </template>
          <template x-if="m.role === 'tool_result'">
            <div class="tool-result" x-text="'got result for ' + (m.content.id || '')"></div>
          </template>
          <template x-if="m.role === 'user' || m.role === 'assistant'">
            <div class="msg-body" x-html="renderText(m.content.text || '')"></div>
          </template>
        </div>
      </template>
      <div class="msg msg-assistant" x-show="streaming" x-cloak>
        <div class="msg-role">assistant</div>
        <div class="msg-body" x-ref="liveBody"></div>
        <div class="thinking-dots" x-show="thinking" x-cloak>thinking…</div>
      </div>
    </div>

    <form class="chat-input" @submit.prevent="sendMessage()">
      <input type="text" x-model="draft" :disabled="streaming"
             placeholder="ask Mnem anything…" x-ref="draft">
      <button class="primary" :disabled="streaming || !draft.trim()">Send</button>
    </form>
  </main>

  <!-- right: citation side panel -->
  <aside class="chat-cite">
    <h3>Citations</h3>
    <p class="hint" x-show="citations.length === 0">
      Cited <code>[mnemo:&lt;id&gt;]</code> nodes appear here.
    </p>
    <ul class="cite-list">
      <template x-for="cid in citations" :key="cid">
        <li>
          <a :href="'/node/' + cid" x-text="cid" @click.prevent="previewNode(cid)"></a>
        </li>
      </template>
    </ul>
    <div class="cite-preview" x-ref="citePreview"></div>
  </aside>
</section>

<script>
function chatPage() {
  return {
    conversations: [],
    activeId: null,
    messages: [],
    citations: [],
    draft: '',
    streaming: false,
    thinking: false,
    _es: null,
    async init() {
      await this.loadConversations();
      if (this.conversations.length) {
        this.openConversation(this.conversations[0].id);
      }
    },
    async loadConversations() {
      const r = await fetch('/v1/chat');
      this.conversations = await r.json();
    },
    async newConversation() {
      const r = await fetch('/v1/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'New chat' }),
      });
      const conv = await r.json();
      await this.loadConversations();
      this.openConversation(conv.id);
    },
    async openConversation(id) {
      this.activeId = id;
      this.citations = [];
      const r = await fetch('/v1/chat/' + id);
      const data = await r.json();
      this.messages = (data.messages || []).map((m, i) =>
        Object.assign({}, m, { key: m.id || ('m' + i) }));
      this.collectCitations();
      this.scroll();
    },
    collectCitations() {
      const seen = [];
      for (const m of this.messages) {
        for (const c of (m.content && m.content.citations) || []) {
          if (!seen.includes(c)) seen.push(c);
        }
      }
      this.citations = seen;
    },
    renderText(t) {
      // Reuse the v2.2 body renderer when available for full fidelity;
      // otherwise escape + linkify [mnemo:id] citations.
      const esc = (s) => s.replace(/[&<>]/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      return esc(t).replace(/\[mnemo:([^\]\s]+)\]/g,
        '<a href="/node/$1" class="cite-link">[mnemo:$1]</a>');
    },
    async previewNode(cid) {
      const box = this.$refs.citePreview;
      box.textContent = 'loading ' + cid + '…';
      try {
        const r = await fetch('/v1/nodes/' + cid);
        if (!r.ok) { box.innerHTML = '<a href="/node/' + cid + '">open ' + cid + '</a>'; return; }
        const n = await r.json();
        if (window.mnemoRenderBody) {
          window.mnemoRenderBody(box, n.body || '', {
            type: n.type, sourcePath: n.source_path });
        } else {
          box.textContent = n.body || '';
        }
      } catch (e) {
        box.innerHTML = '<a href="/node/' + cid + '">open ' + cid + '</a>';
      }
    },
    scroll() {
      this.$nextTick(() => {
        const l = this.$refs.log; if (l) l.scrollTop = l.scrollHeight;
      });
    },
    async sendMessage() {
      const text = this.draft.trim();
      if (!text || !this.activeId) {
        if (!this.activeId) { await this.newConversation(); }
        if (!this.draft.trim()) return;
      }
      const id = this.activeId;
      this.draft = '';
      this.messages.push({ key: 'u' + Date.now(), role: 'user',
        content: { text } });
      this.scroll();
      await fetch('/v1/chat/' + id + '/message', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      this.streamRun(id);
    },
    streamRun(id) {
      this.streaming = true;
      this.thinking = true;
      const live = this.$refs.liveBody;
      if (live) live.textContent = '';
      let buf = '';
      // Native EventSource consumes the same event:/data: frames the
      // reindex SSE (and window.mnemoStreamFromSSE) use.
      const es = new EventSource('/v1/chat/' + id + '/events');
      this._es = es;
      const finish = () => {
        es.close(); this._es = null;
        this.streaming = false; this.thinking = false;
        this.openConversation(id);
      };
      es.addEventListener('thinking', () => { this.thinking = true; });
      es.addEventListener('text_delta', (e) => {
        this.thinking = false;
        buf += JSON.parse(e.data).text || '';
        if (live) live.innerHTML = this.renderText(buf);
        this.scroll();
      });
      es.addEventListener('tool_call', (e) => {
        const d = JSON.parse(e.data);
        this.messages.push({ key: 'tc' + Date.now(), role: 'tool_call',
          content: { name: d.name, args: d.args } });
        this.scroll();
      });
      es.addEventListener('tool_result', (e) => {
        const d = JSON.parse(e.data);
        this.messages.push({ key: 'tr' + Date.now(), role: 'tool_result',
          content: { id: d.id } });
        this.scroll();
      });
      es.addEventListener('permission_request', (e) => {
        const d = JSON.parse(e.data);
        const ok = window.confirm(
          (d.rationale || ('Allow ' + d.tool_name + '?')) +
          '\\n(risk: ' + d.risk + ')');
        fetch('/v1/chat/' + id + '/permit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ permission_id: d.id,
            decision: ok ? 'allow_once' : 'deny' }),
        });
      });
      es.addEventListener('citation', (e) => {
        const d = JSON.parse(e.data);
        if (!this.citations.includes(d.node_id)) this.citations.push(d.node_id);
      });
      es.addEventListener('done', finish);
      es.addEventListener('idle', finish);
      es.addEventListener('error', (e) => {
        try {
          const d = JSON.parse(e.data || '{}');
          if (window.toast) window.toast(d.message || 'chat error', 'error');
        } catch (_) { /* connection close fires a bare error too */ }
        finish();
      });
    },
  };
}
</script>

<style>
  .chat-shell { display: grid; grid-template-columns: 220px 1fr 280px;
    gap: 0; height: calc(100vh - 120px); }
  .chat-rail { border-right: 1px solid var(--border-soft); padding: .75rem;
    overflow-y: auto; }
  .chat-new { width: 100%; margin-bottom: .75rem; }
  .chat-convs { list-style: none; margin: 0; padding: 0; }
  .chat-convs li { padding: .5rem .6rem; border-radius: var(--radius);
    cursor: pointer; color: var(--fg-dim); }
  .chat-convs li.active, .chat-convs li:hover {
    background: var(--bg); color: var(--fg); }
  .chat-thread { display: flex; flex-direction: column; min-width: 0; }
  .chat-log { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
  .msg { margin: .85rem 0; }
  .msg-role { font-size: .7rem; text-transform: uppercase;
    color: var(--fg-muted); margin-bottom: .2rem; }
  .msg-user .msg-body { background: var(--bg); border-radius: var(--radius);
    padding: .55rem .8rem; display: inline-block; }
  .tool-call summary { cursor: pointer; color: var(--fg-muted);
    font-size: .82rem; }
  .tool-call pre, .tool-result { color: var(--fg-dim); font-size: .8rem; }
  .cite-link { color: var(--accent); }
  .chat-input { display: flex; gap: .5rem; padding: .75rem 1.25rem;
    border-top: 1px solid var(--border-soft); }
  .chat-input input { flex: 1; padding: .55rem .7rem; background: var(--bg);
    color: var(--fg); border: 1px solid var(--border);
    border-radius: var(--radius); }
  .chat-cite { border-left: 1px solid var(--border-soft); padding: .75rem;
    overflow-y: auto; }
  .chat-cite h3 { margin: 0 0 .5rem; }
  .cite-list { list-style: none; margin: 0 0 .75rem; padding: 0; }
  .cite-list a { color: var(--accent); font-family: var(--mono);
    font-size: .82rem; }
  .thinking-dots { color: var(--fg-muted); font-size: .8rem; }
  @media (max-width: 900px) { .chat-shell { grid-template-columns: 1fr; }
    .chat-rail, .chat-cite { display: none; } }
</style>
{% endblock %}
