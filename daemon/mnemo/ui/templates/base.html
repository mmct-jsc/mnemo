<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemo{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%237ee7e0'/%3E%3Ctext x='8' y='12' text-anchor='middle' fill='%230b0d10' font-family='monospace' font-weight='700' font-size='10'%3EM%3C/text%3E%3C/svg%3E">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script defer>
    // Toast bus + localStorage-backed notification history.
    const TOAST_HISTORY_KEY = 'mnemo.toast.history';
    const TOAST_DEFER_KEY   = 'mnemo.toast.deferred';

    window.toast = (message, level = 'info', duration = 10000) => {
      document.dispatchEvent(new CustomEvent('mnemo-toast',
        { detail: { message, level, duration } }));
    };

    // Queue a toast to fire after a page navigation. Used by handlers that
    // reload or redirect right after surfacing a result.
    window.toastAfterReload = (message, level = 'info', duration = 10000) => {
      try {
        const queue = JSON.parse(sessionStorage.getItem(TOAST_DEFER_KEY) || '[]');
        queue.push({ message, level, duration });
        sessionStorage.setItem(TOAST_DEFER_KEY, JSON.stringify(queue));
      } catch (_) {}
    };

    // Modal bus: window.modal({...}) returns a Promise<boolean>.
    window.modal = (options = {}) => {
      return new Promise((resolve) => {
        document.dispatchEvent(new CustomEvent('mnemo-modal', {
          detail: {
            title:   options.title   ?? 'Confirm',
            body:    options.body    ?? '',
            confirm: options.confirm ?? { text: 'OK', level: 'primary' },
            cancel:  options.cancel ?? { text: 'Cancel' },
            resolve,
          }
        }));
      });
    };

    // On load, flush any deferred toasts (queued before a reload).
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const queue = JSON.parse(sessionStorage.getItem(TOAST_DEFER_KEY) || '[]');
        sessionStorage.removeItem(TOAST_DEFER_KEY);
        for (const t of queue) window.toast(t.message, t.level, t.duration);
      } catch (_) {}
    });
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" aria-label="mnemo home">mnemo</a>
    <nav>
      <a href="/"             class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/nodes-page"        class="{% if page == 'nodes' %}active{% endif %}">Nodes</a>
      <a href="/graph"        class="{% if page == 'graph' %}active{% endif %}">Graph</a>
      <a href="/sources-page" class="{% if page == 'sources' %}active{% endif %}">Sources</a>
      <a href="/audit-page"   class="{% if page == 'audit' %}active{% endif %}">Audit</a>
      <a href="/settings"     class="{% if page == 'settings' %}active{% endif %}">Settings</a>
    </nav>

    <!-- Notification bell + history dropdown -->
    <div class="bell-wrap" x-data="bellHistory()" @mnemo-toast.document="record($event.detail)" @click.outside="open = false">
      <button class="bell" @click="open = !open; if (open) markRead()"
              :class="{ 'has-unread': unread > 0 }"
              aria-label="notifications">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16z"/>
          <path d="M10 20a2 2 0 0 0 4 0"/>
        </svg>
        <span class="bell-badge" x-show="unread > 0" x-cloak x-text="unread"></span>
      </button>
      <div class="bell-dropdown" x-show="open" x-cloak>
        <header>
          <strong>Notifications</strong>
          <button class="link-button" x-show="items.length" @click.stop="clear()">Clear</button>
        </header>
        <div class="bell-empty" x-show="!items.length" x-cloak>No notifications yet.</div>
        <ul x-show="items.length" x-cloak>
          <template x-for="(t, i) in items.slice(0, 30)" :key="i">
            <li :class="'bell-item bell-' + t.level">
              <span class="bell-icon" x-text="iconFor(t.level)"></span>
              <div>
                <div class="bell-msg" x-text="t.message"></div>
                <div class="bell-time" x-text="formatAgo(t.ts)"></div>
              </div>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <span class="help">
      <a href="https://github.com/mmct-jsc/mnemo" target="_blank" rel="noopener">docs</a>
    </span>
  </header>

  {% block layout %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <!-- Toast stack -->
  <div class="toast-stack" x-data="toastStack()" @mnemo-toast.document="add($event.detail)">
    <template x-for="t in items" :key="t.id">
      <div class="toast" :class="'toast-' + t.level" @click="dismiss(t.id)" x-cloak>
        <span class="toast-icon" x-text="iconFor(t.level)"></span>
        <span class="toast-msg" x-text="t.message"></span>
        <button class="toast-close" @click.stop="dismiss(t.id)" aria-label="dismiss">×</button>
      </div>
    </template>
  </div>

  <!-- Modal -->
  <div x-data="modalHost()"
       @mnemo-modal.document="open($event.detail)"
       @keydown.escape.window="if (current) close(false)">
    <div class="modal-backdrop" x-show="current" x-cloak @click.self="close(false)">
      <div class="modal" role="dialog" aria-modal="true" x-show="current">
        <h3 x-text="current?.title"></h3>
        <p x-text="current?.body"></p>
        <div class="modal-actions">
          <button x-show="current?.cancel" @click="close(false)"
                  x-text="current?.cancel?.text"></button>
          <button :class="current?.confirm?.level === 'danger' ? 'danger' : 'primary'"
                  x-ref="confirmBtn" @click="close(true)"
                  x-text="current?.confirm?.text"></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // TOAST_HISTORY_KEY is declared in the deferred head script. Avoid
    // re-declaring it here (would be a SyntaxError that nukes all JS).
    const TOAST_HISTORY_LIMIT = 50;

    function toastStack() {
      return {
        items: [],
        nextId: 1,
        iconFor(level) { return ({ success: '✓', error: '!', info: 'i', warn: '⚠' })[level] || 'i'; },
        add(detail) {
          const id = this.nextId++;
          const t = { id, level: detail.level || 'info', message: detail.message || '' };
          this.items.push(t);
          const duration = detail.duration ?? 10000;
          if (duration > 0) {
            setTimeout(() => this.dismiss(id), duration);
          }
        },
        dismiss(id) {
          this.items = this.items.filter(x => x.id !== id);
        }
      };
    }

    function modalHost() {
      return {
        current: null,
        open(detail) {
          if (this.current) this.close(false);
          this.current = detail;
          this.$nextTick(() => {
            const btn = this.$refs.confirmBtn;
            if (btn && typeof btn.focus === 'function') btn.focus();
          });
        },
        close(result) {
          if (!this.current) return;
          const r = this.current.resolve;
          this.current = null;
          if (typeof r === 'function') r(result);
        }
      };
    }

    function bellHistory() {
      return {
        items: [],
        open: false,
        unread: 0,
        init() {
          try {
            const raw = localStorage.getItem(TOAST_HISTORY_KEY);
            this.items = raw ? JSON.parse(raw) : [];
            this.unread = parseInt(localStorage.getItem(TOAST_HISTORY_KEY + '.unread') || '0', 10);
          } catch (_) { this.items = []; }
        },
        record(detail) {
          this.items.unshift({
            level: detail.level || 'info',
            message: detail.message || '',
            ts: Math.floor(Date.now() / 1000),
          });
          this.items = this.items.slice(0, TOAST_HISTORY_LIMIT);
          this.unread += 1;
          this.persist();
        },
        markRead() {
          this.unread = 0;
          localStorage.setItem(TOAST_HISTORY_KEY + '.unread', '0');
        },
        clear() {
          this.items = [];
          this.unread = 0;
          this.persist();
        },
        persist() {
          try {
            localStorage.setItem(TOAST_HISTORY_KEY, JSON.stringify(this.items));
            localStorage.setItem(TOAST_HISTORY_KEY + '.unread', String(this.unread));
          } catch (_) {}
        },
        iconFor(level) { return ({ success: '✓', error: '!', info: 'i', warn: '⚠' })[level] || 'i'; },
        formatAgo(ts) {
          if (!ts) return '';
          const diff = Math.floor(Date.now() / 1000) - ts;
          if (diff < 60) return 'just now';
          if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
          if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
          return Math.floor(diff / 86400) + ' days ago';
        }
      };
    }
  </script>
</body>
</html>
