<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemo{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css?v={{ mnemo_version }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%237ee7e0'/%3E%3Ctext x='8' y='12' text-anchor='middle' fill='%230b0d10' font-family='monospace' font-weight='700' font-size='10'%3EM%3C/text%3E%3C/svg%3E">
  <!-- v2.2 phase 1: progressive UX primitives (mnemoSkeleton,
       mnemoStaggeredReveal, mnemoStreamFromSSE, mnemoStreamText).
       Loaded with ``defer`` so the script runs after DOM parsing but
       before Alpine boots -- the primitives need to be on ``window``
       before any Alpine factory function uses them. Cache-busted via
       ``?v={{ mnemo_version }}`` like the CSS, so version bumps
       invalidate the browser cache automatically. -->
  <script src="/static/app.js?v={{ mnemo_version }}" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <!-- Markdown renderer for body previews (node detail + graph side panel). -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js" defer></script>
  <!-- Prism: site-wide syntax highlighting. Loaded here (not per page)
       so code-typed nodes get the same Tomorrow-Night palette on the
       Nebula side-panel, the node detail Preview tab, and the search
       results popover. The autoloader plugin lazy-fetches per-language
       grammars so we don't ship every grammar upfront. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js" defer></script>
  <script>
    // Configure Prism's autoloader as soon as it's parsed; the script
    // above is ``defer``-loaded so this poll waits for it.
    (function tryConfigPrism() {
      if (window.Prism && window.Prism.plugins && window.Prism.plugins.autoloader) {
        window.Prism.plugins.autoloader.languages_path =
          'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
        return;
      }
      setTimeout(tryConfigPrism, 50);
    })();
  </script>
  <script>
    // Node-type palette (single source: daemon/mnemo/ui/palette.py).
    // Exposed early -- before any deferred Alpine / page scripts run --
    // so graph.html's Cytoscape style callbacks pick it up on first
    // render. Templates ALSO inject ``style="--type-color: ..."`` on
    // badges + bar fills so the CSS-side picks the same color.
    window.MNEMO_TYPE_COLORS = {{ type_colors | tojson }};
    window.MNEMO_TYPE_COLOR_FALLBACK = {{ type_color_fallback | tojson }};
    window.mnemoColorFor = (t) => (
      (t && window.MNEMO_TYPE_COLORS[t]) || window.MNEMO_TYPE_COLOR_FALLBACK
    );
  </script>
  <script defer>
    // Toast bus + localStorage-backed notification history.
    const TOAST_HISTORY_KEY = 'mnemo.toast.history';
    const TOAST_DEFER_KEY   = 'mnemo.toast.deferred';

    // ---- Shared markdown renderer ----------------------------------
    // Renders a markdown string to sanitized HTML. Falls back to a
    // <pre>-escaped block if marked / DOMPurify haven't loaded yet.
    window.mnemoMd = (text) => {
      if (!text) return '';
      try {
        if (window.marked && window.DOMPurify) {
          const raw = window.marked.parse(String(text), {
            breaks: false, gfm: true, mangle: false, headerIds: false,
          });
          return window.DOMPurify.sanitize(raw);
        }
      } catch (_) { /* fall through */ }
      const esc = String(text)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<pre class="md-fallback">' + esc + '</pre>';
    };

    // ---- Shared body type / language helpers -----------------------
    // The node taxonomy splits cleanly into "code-typed nodes" (every
    // type that starts with ``code_``) and everything else (memory_*,
    // project_doc, plan_doc, session_summary, commit, ...). The two
    // groups render very differently: code wants a Prism-highlighted
    // <pre> with a monospaced palette; everything else wants the
    // GitHub-flavored markdown pipeline already wired in mnemoMd.
    window.mnemoIsCodeType = (type) => {
      return typeof type === 'string' && type.startsWith('code_');
    };

    // Map a source_path file extension to a Prism language hint.
    // Returns "none" when no recognized extension is present; Prism
    // leaves that as plain text rather than erroring.
    window.mnemoLanguageOf = (sourcePath) => {
      if (!sourcePath) return 'none';
      // Strip the ":start-end" line-range suffix the code parser stamps
      // onto code_function / code_class source_paths.
      const clean = String(sourcePath).replace(/:\d+-\d+(#.+)?$/, '').toLowerCase();
      const m = clean.match(/\.([a-z0-9]+)$/);
      if (!m) return 'none';
      return ({
        py: 'python', pyi: 'python',
        js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'jsx',
        ts: 'typescript', tsx: 'tsx',
        go: 'go',
        rs: 'rust',
        java: 'java', kt: 'kotlin',
        rb: 'ruby', php: 'php',
        cs: 'csharp',
        swift: 'swift',
        c: 'c', h: 'c', cpp: 'cpp', hpp: 'cpp', cc: 'cpp',
        json: 'json', yaml: 'yaml', yml: 'yaml', toml: 'toml',
        md: 'markdown', sh: 'bash', bash: 'bash',
        html: 'markup', xml: 'markup',
        css: 'css', scss: 'scss',
        sql: 'sql',
        gd: 'gdscript',
      })[m[1]] || 'none';
    };

    // Renders a node body into ``targetEl`` based on its ``type`` and
    // ``sourcePath``. Three paths:
    //   1. type starts with "code_" -> Prism-highlighted <pre><code>
    //   2. source_path ends in .md OR no type info -> marked markdown
    //   3. type === "commit" -> escaped plain <pre>
    // Returns the rendering path taken ("code" / "markdown" / "plain").
    //
    // Phase 5 of the v2.2 progressive-UX rollout (v2.2.5): every branch
    // routes its reveal through ``window.mnemoStreamText`` so the body
    // fills in progressively instead of popping in one tick. The branch
    // table:
    //   code_*    -> line-by-line, Prism re-highlights every ~80ms
    //   commit    -> line-by-line into a plain <pre>
    //   markdown  -> word-by-word over each text node of the marked HTML
    // ``targetEl._mnemoStreamCancel`` is set on every call (replaces any
    // prior handle); a future coordinator (chat panel, neighbor click)
    // can call it to abort an in-flight reveal cleanly.
    // ``window.mnemoPrefersReducedMotion()`` short-circuits inside
    // ``mnemoStreamText`` to instant fill -- no special-casing here.
    window.mnemoRenderBody = (targetEl, body, opts) => {
      if (!targetEl) return null;

      // Cancel any prior reveal on this element before starting a new
      // one. Without this, clicking a neighbor mid-stream races two
      // streams into the same target and leaves mixed text.
      if (typeof targetEl._mnemoStreamCancel === 'function') {
        try { targetEl._mnemoStreamCancel(); } catch (_) { /* tolerate */ }
        targetEl._mnemoStreamCancel = null;
      }

      const text = body == null ? '' : String(body);
      const o = opts || {};
      const isCode = window.mnemoIsCodeType(o.type);
      const ext = window.mnemoLanguageOf(o.sourcePath);
      // Markdown extension OR a non-code memory type both go through
      // marked. A code_* node with .md source_path (e.g. README) stays
      // on the markdown path -- the type itself isn't code-shaped.
      const wantsCode = isCode && ext !== 'markdown' && ext !== 'none';
      const wantsPlain = o.type === 'commit';

      // mnemoStreamText is defined in /static/app.js (loaded with defer)
      // and may not exist yet on a cold initial render. When it's not
      // ready we fall back to the prior one-shot innerHTML write so the
      // user still sees content -- streaming will land on the next call.
      const streamer = window.mnemoStreamText;

      if (wantsCode) {
        const lang = ext;
        targetEl.innerHTML =
          '<pre class="mnemo-code language-' + lang + '">' +
          '<code class="language-' + lang + '"></code></pre>';
        const codeEl = targetEl.querySelector('code');
        const reHighlight = () => {
          if (!window.Prism || !codeEl) return;
          try { window.Prism.highlightElement(codeEl); } catch (_) { /* tolerate */ }
        };
        if (streamer && codeEl) {
          const handle = streamer(codeEl, text, {
            unit: 'line', perUnitDelayMs: 8,
          });
          // Periodic re-highlight while the stream is in flight so the
          // colors fill in chunks rather than all at the end.
          let interval = null;
          if (window.Prism) {
            interval = setInterval(reHighlight, 80);
          }
          handle.done.then(() => {
            if (interval) clearInterval(interval);
            reHighlight();
            if (targetEl._mnemoStreamCancel === wrappedCancel) {
              targetEl._mnemoStreamCancel = null;
            }
          });
          const wrappedCancel = () => {
            if (interval) clearInterval(interval);
            handle.cancel();
            reHighlight();
          };
          targetEl._mnemoStreamCancel = wrappedCancel;
        } else if (codeEl) {
          // streamer missing -- one-shot escape + highlight.
          const escaped = text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          codeEl.innerHTML = escaped;
          if (window.Prism) {
            requestAnimationFrame(reHighlight);
          }
        }
        return 'code';
      }

      if (wantsPlain) {
        targetEl.innerHTML = '<pre class="mnemo-plain"></pre>';
        const pre = targetEl.querySelector('pre');
        if (streamer && pre) {
          const handle = streamer(pre, text, {
            unit: 'line', perUnitDelayMs: 8,
          });
          const wrappedCancel = () => handle.cancel();
          handle.done.then(() => {
            if (targetEl._mnemoStreamCancel === wrappedCancel) {
              targetEl._mnemoStreamCancel = null;
            }
          });
          targetEl._mnemoStreamCancel = wrappedCancel;
        } else if (pre) {
          const escaped = text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          pre.innerHTML = escaped;
        }
        return 'plain';
      }

      // Markdown path (default). Render the marked HTML first so layout
      // is final, then walk text nodes and reveal word-by-word. Falls
      // back to a hint when marked / DOMPurify haven't hydrated.
      const html = window.mnemoMd(text);
      if (!html) {
        targetEl.innerHTML = '<p class="hint" style="margin:0;">Body is empty.</p>';
        return 'markdown';
      }
      targetEl.innerHTML = html;

      if (streamer) {
        // Replace each non-whitespace text node with a wrapper span
        // (text nodes don't have appendChild, but mnemoStreamText needs
        // an Element target). Buckets stream sequentially so content
        // fills top-to-bottom.
        const walker = document.createTreeWalker(targetEl, NodeFilter.SHOW_TEXT);
        const collected = [];
        let n;
        while ((n = walker.nextNode())) collected.push(n);
        const buckets = [];
        for (const node of collected) {
          const original = node.nodeValue;
          if (!original || !original.trim()) continue;
          const span = document.createElement('span');
          span.className = 'mnemo-stream-frag';
          // Stream fills it; until then it's empty.
          if (node.parentNode) {
            node.parentNode.replaceChild(span, node);
            buckets.push({ el: span, text: original });
          }
        }
        let cancelled = false;
        let currentHandle = null;
        const runNext = (idx) => {
          if (cancelled || idx >= buckets.length) {
            if (targetEl._mnemoStreamCancel === wrappedCancel) {
              targetEl._mnemoStreamCancel = null;
            }
            return;
          }
          const b = buckets[idx];
          currentHandle = streamer(b.el, b.text, {
            unit: 'word', perUnitDelayMs: 20,
          });
          currentHandle.done.then(() => runNext(idx + 1));
        };
        const wrappedCancel = () => {
          cancelled = true;
          if (currentHandle) {
            try { currentHandle.cancel(); } catch (_) { /* tolerate */ }
          }
          // Flush remaining buckets so the user sees the full document.
          for (const b of buckets) {
            if (b.el.textContent !== b.text) {
              b.el.textContent = b.text;
            }
          }
        };
        targetEl._mnemoStreamCancel = wrappedCancel;
        runNext(0);
      }
      return 'markdown';
    };

    // ---- Shared timestamp formatter --------------------------------
    // Server emits Unix timestamps; we render them in the user's local
    // timezone. Three formats: 'datetime' (default), 'date', 'relative'.
    window.mnemoFormatTs = (ts, fmt = 'datetime') => {
      const n = Number(ts);
      if (!ts || Number.isNaN(n) || n <= 0) return '';
      const d = new Date(n * 1000);
      if (Number.isNaN(d.getTime())) return '';
      if (fmt === 'relative') {
        const diff = Math.floor(Date.now() / 1000) - n;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
        if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
        if (diff < 86400 * 30) return Math.floor(diff / 86400) + ' days ago';
      }
      if (fmt === 'date') {
        return d.toLocaleDateString(undefined,
          { year: 'numeric', month: 'short', day: '2-digit' });
      }
      // datetime (default)
      return d.toLocaleString(undefined, {
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      });
    };

    // Walk the DOM and rewrite <time data-ts="..."> elements to local time.
    // Re-run this after HTMX swaps so fragments also get formatted.
    window.mnemoApplyTimes = (root = document) => {
      const els = root.querySelectorAll('time[data-ts]');
      els.forEach((el) => {
        const ts = el.getAttribute('data-ts');
        const fmt = el.getAttribute('data-fmt') || 'datetime';
        const out = window.mnemoFormatTs(ts, fmt);
        if (out) {
          el.textContent = out;
          el.setAttribute('title', new Date(Number(ts) * 1000).toISOString());
        }
      });
    };

    window.toast = (message, level = 'info', duration = 10000) => {
      document.dispatchEvent(new CustomEvent('mnemo-toast',
        { detail: { message, level, duration } }));
    };

    // Queue a toast to fire after a page navigation. Used by handlers that
    // reload or redirect right after surfacing a result.
    window.toastAfterReload = (message, level = 'info', duration = 10000) => {
      try {
        const queue = JSON.parse(sessionStorage.getItem(TOAST_DEFER_KEY) || '[]');
        queue.push({ message, level, duration });
        sessionStorage.setItem(TOAST_DEFER_KEY, JSON.stringify(queue));
      } catch (_) {}
    };

    // Modal bus: window.modal({...}) returns a Promise<boolean>.
    window.modal = (options = {}) => {
      return new Promise((resolve) => {
        document.dispatchEvent(new CustomEvent('mnemo-modal', {
          detail: {
            title:   options.title   ?? 'Confirm',
            body:    options.body    ?? '',
            confirm: options.confirm ?? { text: 'OK', level: 'primary' },
            cancel:  options.cancel ?? { text: 'Cancel' },
            resolve,
          }
        }));
      });
    };

    // On load, flush any deferred toasts (queued before a reload).
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const queue = JSON.parse(sessionStorage.getItem(TOAST_DEFER_KEY) || '[]');
        sessionStorage.removeItem(TOAST_DEFER_KEY);
        for (const t of queue) window.toast(t.message, t.level, t.duration);
      } catch (_) {}
      // Format Unix timestamps as local datetime everywhere.
      window.mnemoApplyTimes(document);
    });
    // Re-apply to HTMX-swapped content (search results, etc.)
    document.addEventListener('htmx:afterSwap', (e) => {
      if (e.target) window.mnemoApplyTimes(e.target);
    });
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" aria-label="mnemo home">mnemo</a>

    <nav>
      <a href="/"             class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/nodes-page"        class="{% if page == 'nodes' %}active{% endif %}">Nodes</a>
      <a href="/graph"        class="{% if page == 'graph' %}active{% endif %}">Nebula</a>
      <a href="/code"         class="{% if page == 'code' %}active{% endif %}">Code</a>
      <a href="/sources-page" class="{% if page == 'sources' %}active{% endif %}">Sources</a>
      <a href="/audit-page"   class="{% if page == 'audit' %}active{% endif %}">Audit</a>
      <a href="/settings"     class="{% if page == 'settings' %}active{% endif %}">Settings</a>
    </nav>

    <!-- v2.6 phase 10.1: active-project pill removed. Workspaces fully
         own retrieval scope now -- the workspace-switcher below sits
         where the old pill used to live. /v1/projects/active endpoints
         stay alive for CLI back-compat. -->

    <!-- v2.6 phase 7 + 10.3: Workspace switcher. Named factory + NO
         double-init. Right-aligned slot (where the old active-project
         pill lived, after <nav>) so the "current scope" affordance
         stays in the spot users already train their eyes on. The
         dropdown lists active + recent workspaces and exposes
         "+ New workspace", "Manage workspaces", and "No workspace
         (BASE-only mode)" actions. The factory subscribes to
         /v1/events so every open tab re-fetches on workspace_activated
         / _deleted / _cleared. -->
    <div class="workspace-switcher"
         x-data="workspaceSwitcher()"
         @click.outside="open = false; showNewModal = false">
      <button class="workspace-switcher-pill"
              @click="open = !open"
              :class="{ 'is-set': active, 'is-base-only': !active }"
              :title="active ? ('Workspace: ' + active.name) : 'No workspace (BASE-only mode)'">
        <span class="workspace-switcher-dot" aria-hidden="true"></span>
        <span class="workspace-switcher-label" x-text="active ? active.name : 'No workspace'"></span>
        <span class="workspace-switcher-cap" x-show="capWarning" x-cloak x-text="'!'"
              :title="capWarning"></span>
        <span class="workspace-switcher-caret" aria-hidden="true">&#9662;</span>
      </button>

      <div class="workspace-switcher-pop" x-show="open" x-cloak>
        <header>
          <strong>Workspace</strong>
        </header>

        <div class="body">
          <div class="workspace-switcher-error" x-show="error" x-cloak x-text="error"></div>
          <div class="workspace-switcher-warn" x-show="capWarning" x-cloak x-text="capWarning"></div>

          <!-- Active section -->
          <div class="ws-section">
            <div class="ws-section-head">Active</div>
            <template x-if="active">
              <div class="ws-item is-active">
                <span class="ws-item-dot" aria-hidden="true"></span>
                <span class="ws-item-name" x-text="active.name"></span>
                <span class="ws-item-meta"
                      x-text="(active.project_keys?.length || 0) + ' projects'"></span>
              </div>
            </template>
            <template x-if="!active">
              <div class="ws-item is-empty">
                <span class="ws-item-name">No workspace</span>
                <span class="ws-item-meta">(BASE-only mode)</span>
              </div>
            </template>
          </div>

          <!-- Recent section -->
          <div class="ws-section" x-show="recent.length > 0" x-cloak>
            <div class="ws-section-head">Recent</div>
            <template x-for="w in recent" :key="w.id">
              <button class="ws-item is-recent"
                      type="button"
                      @click="activate(w.id)"
                      :disabled="busy">
                <span class="ws-item-name" x-text="w.name"></span>
                <span class="ws-item-meta"
                      x-text="(w.project_keys?.length || 0) + ' projects'"></span>
              </button>
            </template>
          </div>

          <!-- New / Manage actions -->
          <div class="ws-section ws-actions">
            <button type="button"
                    class="ws-action"
                    @click="showNewModal = !showNewModal">+ New workspace</button>
            <a class="ws-action" href="/workspaces">Manage workspaces&hellip;</a>
            <button type="button"
                    class="ws-action ws-action-clear"
                    x-show="active" x-cloak
                    @click="clearActive()"
                    :disabled="busy">No workspace (BASE-only mode)</button>
          </div>

          <!-- New workspace modal-form (inline; keeps the chip self-contained) -->
          <div class="ws-newform" x-show="showNewModal" x-cloak>
            <label>
              <span>Name</span>
              <input type="text"
                     x-model="newName"
                     autocomplete="off" spellcheck="false"
                     placeholder="e.g. ai-edge work"
                     @keydown.enter.prevent="submitChipInput().catch(()=>{})">
            </label>
            <label>
              <span>Projects</span>
              <div class="ws-chips"
                   @click.outside="closeChipSuggestions()"
                   @keydown.escape="closeChipSuggestions()">
                <template x-for="(chip, idx) in chips" :key="chip">
                  <span class="ws-chip">
                    <span class="ws-chip-label" x-text="chip"></span>
                    <button type="button"
                            class="ws-chip-remove"
                            @click="removeChip(idx)"
                            aria-label="Remove">&times;</button>
                  </span>
                </template>
                <input type="text"
                       class="ws-chip-input"
                       x-model="chipInput"
                       autocomplete="off" spellcheck="false"
                       placeholder="type path or project key"
                       @focus="refreshChipSuggestions(chipInput)"
                       @input.debounce.180ms="refreshChipSuggestions(chipInput)"
                       @keydown.down.prevent="moveChipSuggestion(1)"
                       @keydown.up.prevent="moveChipSuggestion(-1)"
                       @keydown.enter.prevent="chipActiveIdx >= 0 ? pickChipSuggestion(chipSuggestions[chipActiveIdx]) : submitChipInput()"
                       @keydown.backspace="if (!chipInput && chips.length) removeChip(chips.length - 1)">
                <div class="ws-chip-suggest" x-show="chipSuggestOpen" x-cloak>
                  <template x-for="(s, i) in chipSuggestions" :key="s.kind + ':' + s.value">
                    <button type="button"
                            class="ws-chip-suggest-item"
                            :class="{ active: i === chipActiveIdx }"
                            @mousedown.prevent="pickChipSuggestion(s)"
                            @mouseenter="chipActiveIdx = i">
                      <span class="ws-chip-suggest-kind"
                            :class="'kind-' + s.kind"
                            x-text="s.kind"></span>
                      <span class="ws-chip-suggest-value" x-text="s.value"></span>
                      <span class="ws-chip-suggest-meta" x-show="s.meta" x-cloak x-text="s.meta"></span>
                    </button>
                  </template>
                </div>
              </div>
            </label>
            <p class="hint">Empty = BASE-only workspace.</p>
            <div class="ws-newform-actions">
              <button type="button"
                      class="primary"
                      @click="createWorkspace()"
                      :disabled="busy || !newName.trim()">Create &amp; activate</button>
              <button type="button"
                      @click="showNewModal = false">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Notification bell + history dropdown -->
    <div class="bell-wrap" x-data="bellHistory()" @mnemo-toast.document="record($event.detail)" @click.outside="open = false">
      <button class="bell" @click="open = !open; if (open) markRead()"
              :class="{ 'has-unread': unread > 0 }"
              aria-label="notifications">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16z"/>
          <path d="M10 20a2 2 0 0 0 4 0"/>
        </svg>
        <span class="bell-badge" x-show="unread > 0" x-cloak x-text="unread"></span>
      </button>
      <div class="bell-dropdown" x-show="open" x-cloak>
        <header>
          <strong>Notifications</strong>
          <button class="link-button" x-show="items.length" @click.stop="clear()">Clear</button>
        </header>
        <div class="bell-empty" x-show="!items.length" x-cloak>No notifications yet.</div>
        <ul x-show="items.length" x-cloak>
          <template x-for="(t, i) in items.slice(0, 30)" :key="i">
            <li :class="'bell-item bell-' + t.level">
              <span class="bell-icon" x-text="iconFor(t.level)"></span>
              <div>
                <div class="bell-msg" x-text="t.message"></div>
                <div class="bell-time" x-text="formatAgo(t.ts)"></div>
              </div>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <span class="help">
      <a href="https://github.com/mmct-jsc/mnemo" target="_blank" rel="noopener">docs</a>
    </span>
  </header>

  {% block layout %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <!-- Toast stack -->
  <div class="toast-stack" x-data="toastStack()" @mnemo-toast.document="add($event.detail)">
    <template x-for="t in items" :key="t.id">
      <div class="toast" :class="'toast-' + t.level" @click="dismiss(t.id)" x-cloak>
        <span class="toast-icon" x-text="iconFor(t.level)"></span>
        <span class="toast-msg" x-text="t.message"></span>
        <button class="toast-close" @click.stop="dismiss(t.id)" aria-label="dismiss">×</button>
      </div>
    </template>
  </div>

  <!-- Modal -->
  <div x-data="modalHost()"
       @mnemo-modal.document="open($event.detail)"
       @keydown.escape.window="if (current) close(false)">
    <div class="modal-backdrop" x-show="current" x-cloak @click.self="close(false)">
      <div class="modal" role="dialog" aria-modal="true" x-show="current">
        <h3 x-text="current?.title"></h3>
        <p x-text="current?.body"></p>
        <div class="modal-actions">
          <button x-show="current?.cancel" @click="close(false)"
                  x-text="current?.cancel?.text"></button>
          <button :class="current?.confirm?.level === 'danger' ? 'danger' : 'primary'"
                  x-ref="confirmBtn" @click="close(true)"
                  x-text="current?.confirm?.text"></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // TOAST_HISTORY_KEY is declared in the deferred head script. Avoid
    // re-declaring it here (would be a SyntaxError that nukes all JS).
    const TOAST_HISTORY_LIMIT = 50;

    // Reusable autocomplete factory. Used by the topbar's active-project
    // path input and by the Sources page's "Add source" path + project-key
    // inputs. Lives in base.html (not per-page) so any HTMX-swapped
    // fragment can call it without re-registering.
    //
    //   const ac = makeAutocomplete({
    //     recentsKey: 'mnemo.recent.<...>',
    //     fetchSuggestions: async (q) => [{ value: '...', kind?, meta? }, ...],
    //   });
    //   ac.init();              // load recents from localStorage
    //   ac.show(currentValue);  // open with recents + fresh suggestions
    //   ac.refresh(typedValue); // re-fetch suggestions (debounce upstream)
    //   ac.move(+/-1);          // arrow-key cursor
    //   ac.recordRecent(picked);// persist a freshly chosen value
    //
    // Each entry is { kind, value, meta? } where kind = 'recent' | 'fs' | 'known'.
    function makeAutocomplete({ recentsKey, fetchSuggestions }) {
      return {
        open: false,
        activeIdx: -1,
        recents: [],            // strings
        suggestions: [],        // { value, meta? }[]
        init() {
          try {
            const raw = localStorage.getItem(recentsKey);
            this.recents = Array.isArray(JSON.parse(raw)) ? JSON.parse(raw) : [];
          } catch (_) { this.recents = []; }
        },
        show(currentValue) {
          this.open = true;
          this.activeIdx = -1;
          this.refresh(currentValue || '');
        },
        async refresh(query) {
          try {
            this.suggestions = await fetchSuggestions(query || '');
          } catch (_) { this.suggestions = []; }
        },
        get entries() {
          // Merge recents + live suggestions, dedup by value, recents first.
          const seen = new Set();
          const out = [];
          for (const v of this.recents) {
            if (seen.has(v)) continue;
            seen.add(v);
            out.push({ kind: 'recent', value: v });
            if (out.length >= 8) break;
          }
          for (const s of this.suggestions) {
            const v = typeof s === 'string' ? s : s.value;
            if (seen.has(v)) continue;
            seen.add(v);
            out.push({ kind: s.kind || 'fs', value: v, meta: s.meta || null });
            if (out.length >= 30) break;
          }
          return out;
        },
        move(delta) {
          const n = this.entries.length;
          if (!n) { this.activeIdx = -1; return; }
          this.activeIdx = (this.activeIdx + delta + n) % n;
        },
        recordRecent(value) {
          if (!value) return;
          this.recents = [value, ...this.recents.filter(v => v !== value)].slice(0, 12);
          try {
            localStorage.setItem(recentsKey, JSON.stringify(this.recents));
          } catch (_) { /* quota etc */ }
        },
      };
    }

    function toastStack() {
      return {
        items: [],
        nextId: 1,
        iconFor(level) { return ({ success: '✓', error: '!', info: 'i', warn: '⚠' })[level] || 'i'; },
        add(detail) {
          const id = this.nextId++;
          const t = { id, level: detail.level || 'info', message: detail.message || '' };
          this.items.push(t);
          const duration = detail.duration ?? 10000;
          if (duration > 0) {
            setTimeout(() => this.dismiss(id), duration);
          }
        },
        dismiss(id) {
          this.items = this.items.filter(x => x.id !== id);
        }
      };
    }

    function modalHost() {
      return {
        current: null,
        open(detail) {
          if (this.current) this.close(false);
          this.current = detail;
          this.$nextTick(() => {
            const btn = this.$refs.confirmBtn;
            if (btn && typeof btn.focus === 'function') btn.focus();
          });
        },
        close(result) {
          if (!this.current) return;
          const r = this.current.resolve;
          this.current = null;
          if (typeof r === 'function') r(result);
        }
      };
    }

    function activeProjectWidget() {
      return {
        active: null,           // {project_key, path, since} or null
        newPath: '',
        popoverOpen: false,
        busy: false,
        // v1.2: filesystem path autocomplete on the "Set path" input
        // -- same /v1/fs/suggest backed suggestions as the Sources
        // page so the user gets continuous discovery, not just a
        // text field. ``recentsKey`` is intentionally shared with
        // the Sources page so a path the user typed in either place
        // shows up in the other.
        pathAc: makeAutocomplete({
          recentsKey: 'mnemo.recent.paths',
          fetchSuggestions: async (q) => {
            const r = await fetch('/v1/fs/suggest?prefix=' + encodeURIComponent(q || ''));
            if (!r.ok) return [];
            const data = await r.json();
            return (data.candidates || []).map(p => ({ value: p, kind: 'fs' }));
          },
        }),
        async init() {
          this.pathAc.init();
          await this.refresh();
        },
        async refresh() {
          try {
            const r = await fetch('/v1/projects/active');
            if (!r.ok) { this.active = null; return; }
            const body = await r.text();
            this.active = body ? JSON.parse(body) : null;
            // Pre-fill the input with the active path so "set" feels
            // like an edit when one is already set.
            this.newPath = this.active ? this.active.path : '';
            // Re-format the relative <time> the popover renders.
            window.mnemoApplyTimes(document);
          } catch (_) {
            this.active = null;
          }
        },
        async setActive() {
          if (!this.newPath) return;
          this.busy = true;
          try {
            const r = await fetch('/v1/projects/active', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ path: this.newPath }),
            });
            if (!r.ok) throw new Error(await r.text());
            const data = await r.json();
            this.active = data;
            window.toast('Active project: ' + data.project_key, 'success');
            this.popoverOpen = false;
          } catch (e) {
            window.toast('Set active failed: ' + e, 'error');
          } finally {
            this.busy = false;
          }
        },
        async clearActive() {
          this.busy = true;
          try {
            await fetch('/v1/projects/active', { method: 'DELETE' });
            this.active = null;
            this.newPath = '';
            window.toast('Active project cleared', 'success');
          } catch (e) {
            window.toast('Clear failed: ' + e, 'error');
          } finally {
            this.busy = false;
          }
        },
      };
    }

    // v1.2 phase 3: thumbs feedback factory. Bound on the hits <ul>
    // produced by _search_results.html. One instance per HTMX search
    // swap; queryId is baked in at render time so the POST body needs
    // no DOM scraping.
    //
    // The server already deduplicates on (query_id, node_id, reason)
    // so a double-click is idempotent. We still track `pending` to
    // disable the button mid-flight and avoid the visible flicker
    // between optimistic update and confirmation.
    function hitsFeedback(queryId) {
      return {
        queryId: queryId,
        feedback: {},   // nodeId -> 'up' | 'down' (visible state)
        pending: {},    // nodeId -> bool (POST in flight)
        async vote(nodeId, reason) {
          if (this.pending[nodeId]) return;
          // Optimistic UI: flip immediately, revert on error.
          const newState = reason === 'thumbs_up' ? 'up' : 'down';
          const prevState = this.feedback[nodeId] || null;
          this.feedback[nodeId] = newState;
          this.pending[nodeId] = true;
          try {
            const r = await fetch('/v1/feedback', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query_id: this.queryId,
                node_id: nodeId,
                reason: reason,
              }),
            });
            if (!r.ok) throw new Error(await r.text());
            window.toast(
              reason === 'thumbs_up' ? 'Marked helpful' : 'Marked not helpful',
              'success', 3000);
          } catch (e) {
            // Roll back the optimistic flip on failure.
            if (prevState) this.feedback[nodeId] = prevState;
            else delete this.feedback[nodeId];
            window.toast('Feedback failed: ' + e, 'error');
          } finally {
            this.pending[nodeId] = false;
          }
        },
      };
    }

    function bellHistory() {
      return {
        items: [],
        open: false,
        unread: 0,
        init() {
          try {
            const raw = localStorage.getItem(TOAST_HISTORY_KEY);
            this.items = raw ? JSON.parse(raw) : [];
            this.unread = parseInt(localStorage.getItem(TOAST_HISTORY_KEY + '.unread') || '0', 10);
          } catch (_) { this.items = []; }
        },
        record(detail) {
          this.items.unshift({
            level: detail.level || 'info',
            message: detail.message || '',
            ts: Math.floor(Date.now() / 1000),
          });
          this.items = this.items.slice(0, TOAST_HISTORY_LIMIT);
          this.unread += 1;
          this.persist();
        },
        markRead() {
          this.unread = 0;
          localStorage.setItem(TOAST_HISTORY_KEY + '.unread', '0');
        },
        clear() {
          this.items = [];
          this.unread = 0;
          this.persist();
        },
        persist() {
          try {
            localStorage.setItem(TOAST_HISTORY_KEY, JSON.stringify(this.items));
            localStorage.setItem(TOAST_HISTORY_KEY + '.unread', String(this.unread));
          } catch (_) {}
        },
        iconFor(level) { return ({ success: '✓', error: '!', info: 'i', warn: '⚠' })[level] || 'i'; },
        formatAgo(ts) {
          if (!ts) return '';
          const diff = Math.floor(Date.now() / 1000) - ts;
          if (diff < 60) return 'just now';
          if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
          if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
          return Math.floor(diff / 86400) + ' days ago';
        }
      };
    }
  </script>
</body>
</html>
