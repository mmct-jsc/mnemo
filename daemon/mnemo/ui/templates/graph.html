{% extends "base.html" %}
{% block title %} - Nebula{% endblock %}
{% block head_extra %}
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base/layout-base.js"></script>
<script src="https://unpkg.com/cose-base/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
<!-- Prism is loaded site-wide from base.html; no per-page setup. -->
{% endblock %}
{% block layout %}
<main class="full">
  <!-- Alpine auto-invokes init() when it lives on the x-data object,
       so no explicit x-init="init()" -- adding it would run init()
       twice and force-render the fcose layout twice on first load. -->
  <section class="nebula-shell" x-data="nebula()">

    <!-- Left: file tree (VSCode-style) -->
    <aside class="nebula-tree">
      <h3 class="tree-title">
        <svg viewBox="0 0 16 16" class="tree-title-icon"><path fill="currentColor" d="M2 3.5A1.5 1.5 0 0 1 3.5 2h3.379a1.5 1.5 0 0 1 1.06.44l.622.62A1.5 1.5 0 0 0 9.622 3.5H12.5A1.5 1.5 0 0 1 14 5v6.5A1.5 1.5 0 0 1 12.5 13h-9A1.5 1.5 0 0 1 2 11.5v-8Z"/></svg>
        <span>Files</span>
        <span x-show="contextProject" x-cloak class="tree-title-scope"
              x-text="contextProject"></span>
      </h3>
      <template x-if="treeRoot && Object.keys(treeRoot.children).length === 0">
        <p class="hint" style="padding:0.5rem;">
          No code modules in this view.
          <a href="/sources-page">Add a code_repo</a>?
        </p>
      </template>
      <!-- Recursive renderer: emits a directory branch or a file row
           based on the node shape. Indentation depth is passed in. -->
      <template x-if="treeRoot">
        <ul class="vscode-tree">
          <template x-for="(child, name) in treeRoot.children" :key="name">
            <li x-data="{ child: child, name: name }">
              <!-- Directory -->
              <template x-if="child.isDir">
                <details open>
                  <summary class="vscode-dir"><span class="vscode-dir-row">
                    <span class="vscode-chev" aria-hidden="true"></span>
                    <svg class="vscode-icon dir-icon" viewBox="0 0 16 16">
                      <path fill="#7eb6d6" d="M1.5 3.5A1.5 1.5 0 0 1 3 2h3l1.5 1.5H13A1.5 1.5 0 0 1 14.5 5v7A1.5 1.5 0 0 1 13 13.5H3A1.5 1.5 0 0 1 1.5 12V3.5Z"/>
                    </svg>
                    <span class="vscode-dir-label" x-text="name"></span>
                  </span></summary>
                  <ul>
                    <template x-for="(grand, gname) in child.children" :key="gname">
                      <li>
                        <template x-if="grand.isDir">
                          <details>
                            <summary class="vscode-dir"><span class="vscode-dir-row">
                              <span class="vscode-chev" aria-hidden="true"></span>
                              <svg class="vscode-icon dir-icon" viewBox="0 0 16 16">
                                <path fill="#7eb6d6" d="M1.5 3.5A1.5 1.5 0 0 1 3 2h3l1.5 1.5H13A1.5 1.5 0 0 1 14.5 5v7A1.5 1.5 0 0 1 13 13.5H3A1.5 1.5 0 0 1 1.5 12V3.5Z"/>
                              </svg>
                              <span class="vscode-dir-label" x-text="gname"></span>
                            </span></summary>
                            <ul>
                              <template x-for="leaf in grand.leaves" :key="leaf.id">
                                <li>
                                  <a href="#" class="tree-file vscode-file"
                                     :class="[
                                       { active: selected && selected.id === leaf.id },
                                       'ext-' + fileExt(leaf.label),
                                     ]"
                                     :title="leaf.label"
                                     @click.prevent="focusNode(leaf.id)">
                                    <span class="vscode-file-icon" x-html="fileIcon(leaf.label)"></span>
                                    <span class="vscode-file-name" x-text="leaf.label"></span>
                                    <span class="vscode-file-meta" x-text="leaf.childCount"></span>
                                  </a>
                                </li>
                              </template>
                            </ul>
                          </details>
                        </template>
                        <template x-if="!grand.isDir">
                          <a href="#" class="tree-file vscode-file"
                             :class="[
                               { active: selected && selected.id === grand.id },
                               'ext-' + fileExt(gname),
                             ]"
                             :title="gname"
                             @click.prevent="focusNode(grand.id)">
                            <span class="vscode-file-icon" x-html="fileIcon(gname)"></span>
                            <span class="vscode-file-name" x-text="gname"></span>
                            <span class="vscode-file-meta" x-text="grand.childCount"></span>
                          </a>
                        </template>
                      </li>
                    </template>
                  </ul>
                </details>
              </template>
              <!-- File at the top level (no directory wrapping) -->
              <template x-if="!child.isDir">
                <a href="#" class="tree-file vscode-file"
                   :class="[
                     { active: selected && selected.id === child.id },
                     'ext-' + fileExt(name),
                   ]"
                   :title="name"
                   @click.prevent="focusNode(child.id)">
                  <span class="vscode-file-icon" x-html="fileIcon(name)"></span>
                  <span class="vscode-file-name" x-text="name"></span>
                  <span class="vscode-file-meta" x-text="child.childCount"></span>
                </a>
              </template>
            </li>
          </template>
        </ul>
      </template>
    </aside>

    <!-- Gutter (drag to resize left panel) -->
    <div class="nebula-gutter nebula-gutter-left"
         @mousedown="startResize($event, 'left')"
         :class="{ dragging: dragging === 'left' }"></div>

    <!-- Center: canvas -->
    <div class="nebula-canvas">
      <div id="cy-nebula"></div>

      <div class="nebula-hint">
        scroll to zoom · drag to pan · click a node
      </div>

      <div class="nebula-context" x-show="contextProject" x-cloak>
        scope: <strong x-text="contextProject"></strong>
        <a href="/graph">clear</a>
      </div>
    </div>

    <!-- Gutter (drag to resize right panel) -->
    <div class="nebula-gutter nebula-gutter-right"
         @mousedown="startResize($event, 'right')"
         :class="{ dragging: dragging === 'right' }"></div>

    <!-- Right: detail panel -->
    <aside class="nebula-detail">
      <template x-if="!selected">
        <div class="empty-detail">
          Click a node on the canvas to see its details, neighbors, and
          edge breakdown here.
        </div>
      </template>
      <template x-if="selected">
        <div>
          <button class="detail-close" type="button"
                  @click="deselect()"
                  title="Close (Esc)">&times;</button>
          <span class="ntype" :class="'ntype-' + selected.type"
                :style="'--type-color: ' + typeColor(selected.type)"
                x-text="selected.type"></span>
          <h3 x-text="selected.name"></h3>
          <p class="nsource" x-show="selected.source_path" x-cloak
             x-text="selected.source_path"></p>
          <p class="ndesc" x-show="selected.description" x-cloak
             x-text="selected.description"></p>
          <!-- v2.2 phase 4: body streams in word-by-word via
               window.mnemoStreamText. Old x-text path is gone --
               streamBodyToCode handles both fill + Prism highlight.
               The x-effect re-runs whenever selected.body changes
               (i.e. on every node click); streamBodyToCode cancels
               any in-flight stream before starting the new one so
               clicks during a reveal don't race. -->
          <pre x-show="selected.body" x-cloak
               class="line-numbers"
               :class="'language-' + bodyLanguage(selected.source_path)"><code
               x-ref="bodyCode"
               :class="'language-' + bodyLanguage(selected.source_path)"
               x-effect="streamBodyToCode($refs.bodyCode, selected.body, selected.source_path)"></code></pre>

          <h4 x-show="neighbors.length">Connections (<span x-text="neighbors.length"></span>)</h4>
          <!-- v2.2 phase 4: neighbors render via mnemoStaggeredReveal
               so items fade in paced (30ms between items, 180ms each)
               instead of popping in together. The x-effect re-runs
               when ``neighbors`` changes; renderNeighborsList cancels
               any in-flight reveal before starting a new one. -->
          <ul class="nlist" x-ref="nlist"
              x-effect="renderNeighborsList($refs.nlist, neighbors)"></ul>

          <div class="nactions">
            <a class="primary" :href="'/node/' + selected.id">Open detail</a>
            <button @click="copyCitation()">Copy cite</button>
          </div>
        </div>
      </template>
    </aside>

    <!-- Bottom: filter bar -->
    <div class="nebula-filterbar">
      <input type="search" placeholder="filter by name / type..."
             x-model="filterText" @input.debounce.180ms="applyFilters()">
      <div class="nebula-chips">
        <template x-for="t in nodeTypes" :key="t">
          <span class="nebula-chip"
                :class="{ on: typeFilters[t], off: !typeFilters[t] }"
                @click="typeFilters[t] = !typeFilters[t]; applyFilters()">
            <span class="swatch" :class="'swatch-' + t"
                  :style="'--type-color: ' + typeColor(t)"></span>
            <span x-text="t.replace('memory_','').replace('code_','')"></span>
          </span>
        </template>
      </div>
      <label class="nebula-slider">
        <span class="slider-label">min conf</span>
        <span class="slider-wrap">
          <input type="range" min="0" max="100" step="1"
                 list="conf-ticks"
                 x-model.number="minConfidence" @input.debounce.80ms="applyFilters()">
          <datalist id="conf-ticks">
            <option value="0"></option>
            <option value="50"></option>
            <option value="70"></option>
            <option value="80"></option>
            <option value="90"></option>
            <option value="95"></option>
            <option value="100"></option>
          </datalist>
          <span class="slider-marks">
            <span data-pct="0">0</span>
            <span data-pct="50">.5</span>
            <span data-pct="70">.7</span>
            <span data-pct="90">.9</span>
            <span data-pct="100">1</span>
          </span>
        </span>
        <span class="slider-value" x-text="(minConfidence / 100).toFixed(2)"></span>
        <button type="button" class="slider-reset"
                @click="minConfidence = 0; applyFilters()"
                x-show="minConfidence > 0" x-cloak
                title="reset to 0">×</button>
      </label>
      <label class="nebula-hops" x-show="contextNodeId" x-cloak>
        hops
        <select x-model.number="hops" @change="reload()">
          <option :value="1">1</option>
          <option :value="2">2</option>
          <option :value="3">3</option>
        </select>
      </label>
      <div class="nebula-layout-buttons">
        <button @click="relayout('fcose')"
                :class="{ active: currentLayout === 'fcose' }">force</button>
        <button @click="relayout('concentric')"
                :class="{ active: currentLayout === 'concentric' }">rings</button>
        <button @click="relayout('breadthfirst')"
                :class="{ active: currentLayout === 'breadthfirst' }">tree</button>
        <button @click="relayout('grid')"
                :class="{ active: currentLayout === 'grid' }">grid</button>
      </div>
      <span class="nebula-stats" x-text="stats"></span>
    </div>
  </section>
</main>

<script>
// Nebula palette: pulled from the site-wide single source
// (daemon/mnemo/ui/palette.py, exposed via base.html as
// window.MNEMO_TYPE_COLORS). Keeping the alias TYPE_COLORS for the
// rest of this file so the existing call sites don't have to change.
// New node types now show up in the canvas the moment they land in
// palette.py -- no per-file edits required.
const TYPE_COLORS = window.MNEMO_TYPE_COLORS || {};
const TYPE_COLOR_FALLBACK = window.MNEMO_TYPE_COLOR_FALLBACK || '#7ee7e0';

// Edge palette: each relation gets a color that matches its
// conceptual "weight" in the graph. Brighter = more semantic.
const REL_COLORS = {
  calls:                '#c084fc',  // purple -- the runtime flow
  routes_to:            '#fb923c',  // amber -- request routing
  at_endpoint:          '#4ade80',  // emerald -- cross-stack join
  renders:              '#c084fc',  // violet -- UI composition
  imports:              '#06b6d4',  // cyan -- module dep
  defines:              '#5fa8ff',  // blue -- structural
  method_of:            '#5fa8ff',  // blue -- structural
  references_function:  '#f43f5e',  // crimson -- provenance touch
  motivated_by:         '#f43f5e',
  closed_by:            '#f43f5e',
  // v1 memory relations
  applies_to:           '#22d3ee',
  derived_from:         '#22d3ee',
  contradicts:          '#ff8a4c',
  supersedes:           '#818cf8',
  mentions:             '#c4f37a',
  co_occurs_with:       '#e879f9',
};

function nebula() {
  return {
    cy: null,
    selected: null,
    neighbors: [],
    treeRoot: null,
    nodeTypes: [],
    typeFilters: {},
    filterText: '',
    minConfidence: 0,
    hops: 2,
    dragging: null,
    contextProject: null,
    contextNodeId: null,
    stats: '',
    rawElements: [],
    currentLayout: 'fcose',

    // Single source of truth for ANY in-DOM type color (filter chips,
    // neighbor dots, detail-panel ntype pill). Reads from the same
    // window.MNEMO_TYPE_COLORS dict that the Cytoscape canvas uses,
    // so chip color and node color stay in lockstep -- editing
    // palette.py updates BOTH at once.
    typeColor(t) {
      return TYPE_COLORS[t] || TYPE_COLOR_FALLBACK;
    },

    // v2.2 phase 4: body streaming. Called from the x-effect on
    // <code x-ref="bodyCode">. Cancels any in-flight reveal (so
    // clicks during a stream don't race) and starts a new
    // mnemoStreamText with the body content. After the stream
    // completes, Prism highlights the now-static <code>.
    streamBodyToCode(codeEl, body, sourcePath) {
      if (!codeEl) return;
      if (this._bodyStream && this._bodyStream.cancel) {
        try { this._bodyStream.cancel(); } catch (_) {}
      }
      this._bodyStream = null;
      if (!body) {
        codeEl.textContent = '';
        return;
      }
      if (!window.mnemoStreamText) {
        // Fallback: text-only fill, then highlight. Lets the page
        // work even if app.js failed to load.
        codeEl.textContent = body;
        if (window.Prism) requestAnimationFrame(() => Prism.highlightElement(codeEl));
        return;
      }
      // Pick per-language unit. Word-by-word for prose; line-by-line
      // for code (cheaper highlight + reads as "code arriving line
      // by line" rather than typing-effect).
      const lang = this.bodyLanguage(sourcePath);
      const isCode = lang !== 'none' && lang !== 'markdown';
      this._bodyStream = window.mnemoStreamText(codeEl, body, {
        unit: isCode ? 'line' : 'word',
        // 5ms/word is fast enough that a 200-word memory body
        // settles in ~1s; 8ms/line keeps even a 100-line code
        // block visible in under a second.
        perUnitDelayMs: isCode ? 8 : 5,
      });
      this._bodyStream.done.then(() => {
        if (window.Prism) requestAnimationFrame(() => Prism.highlightElement(codeEl));
      });
    },

    // v2.2 phase 4: neighbors list staggered reveal. Replaces the
    // old <template x-for> path so items appear paced instead of
    // popping in together. Cancellation prevents racing reveals
    // when the user clicks several neighbors in quick succession.
    renderNeighborsList(ul, items) {
      if (!ul) return;
      if (this._neighborReveal && this._neighborReveal.cancel) {
        try { this._neighborReveal.cancel(); } catch (_) {}
      }
      this._neighborReveal = null;
      // Always clear the list before re-rendering. Saves us from
      // de-duping at insert time.
      while (ul.firstChild) ul.removeChild(ul.firstChild);

      const slice = (items || []).slice(0, 20);
      if (slice.length === 0) return;

      if (!window.mnemoStaggeredReveal) {
        // Fallback: synchronous render. Keeps the panel functional
        // when app.js hasn't loaded.
        for (let i = 0; i < slice.length; i++) {
          ul.appendChild(this._neighborItemEl(slice[i]));
        }
        return;
      }
      this._neighborReveal = window.mnemoStaggeredReveal(ul, slice, {
        perItemDelayMs: 30,
        fadeInMs: 180,
        renderOne: (nb) => this._neighborItemEl(nb),
      });
    },

    // Builds one <li> for the neighbor list. Pulled out so both
    // the staggered + fallback paths share the markup -- they
    // were diverging when inlined.
    _neighborItemEl(nb) {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.addEventListener('click', () => this.focusNode(nb.id));
      const dot = document.createElement('span');
      dot.className = 'dot swatch-' + nb.type;
      dot.style.setProperty('--type-color', this.typeColor(nb.type));
      btn.appendChild(dot);
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = nb.name;
      btn.appendChild(label);
      const rel = document.createElement('span');
      rel.className = 'rel';
      rel.textContent = nb.rel + (
        nb.confidence < 1 ? ' (' + nb.confidence.toFixed(2) + ')' : ''
      );
      btn.appendChild(rel);
      li.appendChild(btn);
      return li;
    },

    async init() {
      // Read query string for ?project= and ?node= so /code cards
      // can deep-link into this page with context.
      const params = new URLSearchParams(window.location.search);
      this.contextProject = params.get('project') || null;
      this.contextNodeId = params.get('node') || null;
      if (params.get('hops')) this.hops = parseInt(params.get('hops'), 10) || 2;

      // Restore panel widths from localStorage.
      const left = localStorage.getItem('nebula.left');
      const right = localStorage.getItem('nebula.right');
      const shell = document.querySelector('.nebula-shell');
      if (left && shell)  shell.style.setProperty('--nebula-left', left);
      if (right && shell) shell.style.setProperty('--nebula-right', right);

      if (window.cytoscape && window.cytoscapeFcose) {
        cytoscape.use(cytoscapeFcose);
      }
      await this.reload();
    },

    async reload() {
      const qs = new URLSearchParams();
      if (this.contextProject) qs.set('project', this.contextProject);
      if (this.contextNodeId) {
        qs.set('node', this.contextNodeId);
        qs.set('hops', String(this.hops));
      }
      const r = await fetch('/ui/graph-data?' + qs.toString());
      const data = await r.json();
      this.rawElements = data.elements;
      this.renderCanvas();
      this.buildTree();
      this.buildTypeFilters();

      // If we came in with ?node=, pre-select it. The camera pan +
      // zoom-up live inside selectFromCanvas now (v2.2.2), so this
      // path no longer needs its own cy.animate call.
      if (this.contextNodeId && this.cy) {
        const target = this.cy.getElementById(this.contextNodeId);
        if (target && target.length) {
          this.selectFromCanvas(target);
        }
      }
    },

    renderCanvas() {
      // Compute degree on the fly so node size scales with connectivity.
      const degree = {};
      for (const e of this.rawElements) {
        if (e.data.source) {
          degree[e.data.source] = (degree[e.data.source] || 0) + 1;
          degree[e.data.target] = (degree[e.data.target] || 0) + 1;
        }
      }
      const els = this.rawElements.map(e => {
        if (e.data.id !== undefined) {
          return { data: { ...e.data, deg: degree[e.data.id] || 0 } };
        }
        return e;
      });

      if (this.cy) this.cy.destroy();
      this.cy = cytoscape({
        container: document.getElementById('cy-nebula'),
        elements: els,
        minZoom: 0.12,
        maxZoom: 4,
        // Cheap-render hints for big graphs: cache the rendered scene
        // as a texture during pan/zoom so we don't redraw every edge
        // every frame. Render labels only at moderate zoom.
        textureOnViewport: true,
        hideEdgesOnViewport: true,
        hideLabelsOnViewport: true,
        pixelRatio: 1.0,
        wheelSensitivity: 0.18,  // slow, silky scroll-zoom
        // Motion blur smooths fast pans -- the trail decays over a
        // few frames so the canvas never looks jagged during drag.
        motionBlur: true,
        motionBlurOpacity: 0.18,
        // Damped pan: cytoscape eases to a stop when the user
        // releases the mouse rather than locking instantly.
        userPanningEnabled: true,
        autounselectify: false,
        style: [
          // Nodes -----------------------------------------------------
          // Nebula: ALL nodes are circles. Color, glow + size carry
          // the type info; the user gets a calmer, more readable
          // canvas than a zoo of shapes.
          { selector: 'node', style: {
              shape: 'ellipse',
              label: 'data(label)',
              'background-color': (n) => TYPE_COLORS[n.data('type')] || TYPE_COLOR_FALLBACK,
              'background-opacity': 1.0,
              // Inner glow / halo: ``underlay`` paints BEHIND the node
              // so the color bleeds outward like a star -- the
              // "nebula" feel the design asked for.
              'underlay-color': (n) => TYPE_COLORS[n.data('type')] || TYPE_COLOR_FALLBACK,
              'underlay-opacity': 0.32,
              'underlay-padding': 8,
              'underlay-shape': 'ellipse',
              'border-width': 1,
              'border-color': '#0a0d14',
              color: '#e6edf3',
              'font-size': '11px',
              'font-weight': 500,
              'font-family': 'ui-monospace, Menlo, Consolas, monospace',
              'text-valign': 'bottom',
              'text-margin-y': 7,
              'text-outline-color': '#0a0d14',
              'text-outline-width': 3,
              'text-max-width': '140px',
              'text-opacity': 0,  // hidden by default; revealed in higher-zoom selector below
              'overlay-padding': 8,
              width:  (n) => 14 + Math.min(40, (n.data('deg') || 0) * 1.6),
              height: (n) => 14 + Math.min(40, (n.data('deg') || 0) * 1.6),
              // PERFORMANCE: only transition properties that change on
              // the ONE-or-few selected nodes (border-width + underlay-
              // padding for the "lifted" effect). ``opacity`` and
              // ``underlay-opacity`` are deliberately NOT transitioned --
              // they're the properties .dim toggles across the entire
              // graph (471+ nodes), and 220ms of simultaneous opacity
              // tweens with motion-blur on is the source of the lag the
              // user feels when deselecting.
              'transition-property': 'border-width, underlay-padding',
              'transition-duration': '220ms',
          }},
          // Labels appear when the user zooms in -- keeps the
          // overview clean.
          { selector: 'node:visible', style: { 'text-opacity': 1 }},
          { selector: 'node.hl', style: {
              'border-width': 2,
              'border-color': '#7ee7e0',
              'underlay-color': '#7ee7e0',
              'underlay-opacity': 0.6,
              'underlay-padding': 14,
              'z-index': 10,
          }},
          { selector: 'node.dim',   style: { opacity: 0.12, 'underlay-opacity': 0.04 }},
          { selector: 'node.hide',  style: { display: 'none' }},
          // v2.2 phase 4: chunked initial paint. Right after the
          // fcose layout, every node gets ``.preload-hidden`` so the
          // canvas reads as empty. ``_renderCanvasChunked`` then
          // removes the class in batches of CHUNK_SIZE by descending
          // degree, producing the "densest cluster appears first,
          // rest fade in waves" effect. ``opacity: 0`` is scoped to
          // this class only -- the base node selector still has the
          // v2.1.2 transition-property list (border-width +
          // underlay-padding only) so dim/un-dim later doesn't
          // re-introduce the fanout lag we fixed there.
          { selector: 'node.preload-hidden', style: { opacity: 0, 'underlay-opacity': 0 }},

          // Edges. Brighter base, gradient-ready, with arrow caps on
          // directional relations.
          { selector: 'edge', style: {
              width: (e) => 1.0 + Math.min(2.8, (e.data('confidence') || 1.0) * 2.0),
              'line-color': (e) => REL_COLORS[e.data('relation')] || '#88a',
              'line-opacity': (e) => {
                const c = e.data('confidence') ?? 1.0;
                return 0.45 + c * 0.4;
              },
              'curve-style': 'straight',
              'target-arrow-color': (e) => REL_COLORS[e.data('relation')] || '#88a',
              'target-arrow-shape': (e) =>
                ['calls', 'routes_to', 'imports', 'method_of', 'references_function',
                 'motivated_by', 'closed_by'].includes(e.data('relation')) ? 'triangle-backcurve' : 'none',
              'arrow-scale': 0.9,
              'transition-property': 'opacity, width, line-color',
              'transition-duration': '200ms',
          }},
          // Lower-confidence edges -> dashed / dotted.
          { selector: 'edge[confidence < 0.9]', style: { 'line-style': 'dashed' }},
          { selector: 'edge[confidence < 0.7]', style: { 'line-style': 'dotted', 'line-opacity': 0.45 }},
          { selector: 'edge.dim',  style: { 'line-opacity': 0.03 }},
          { selector: 'edge.hl',   style: {
              'line-opacity': 1.0,
              width: 2.6,
              // marching-ants effect on highlighted edges so the eye
              // follows the direction of the call / route / import.
              'line-style': 'dashed',
              'line-dash-pattern': [6, 4],
              'line-dash-offset': 0,
          }},
          { selector: 'edge.hide', style: { display: 'none' }},
        ],
        // Initial layout: NO animation, NO randomization. fcose
        // converges in ~50-100 quick iterations and renders once.
        // Subsequent user-triggered relayouts animate via relayout().
        layout: {
          name: 'fcose',
          animate: false,
          randomize: true,
          quality: 'default',
          nodeRepulsion: 8000,
          idealEdgeLength: 80,
          edgeElasticity: 0.45,
          gravity: 0.25,
          padding: 50,
          fit: true,
          // tile: false -- let fcose spread components organically;
          // packing them with tile=true produces a linear / diagonal
          // arrangement on graphs with many small clusters.
        },
      });

      this.cy.on('tap', 'node', (evt) => {
        // Suppress the canvas-tap that fires alongside a node-tap on
        // some platforms (which would deselect immediately).
        evt.stopPropagation && evt.stopPropagation();
        this.selectFromCanvas(evt.target);
      });
      this.cy.on('tap', (evt) => {
        // Empty-space tap means the target is the Cytoscape CORE, not
        // a node/edge collection. The intuitive check ``evt.target ===
        // this.cy`` fails in minified builds because the core is
        // wrapped in an obfuscated class (e.g. ``Os``) that isn't
        // referentially equal to ``cy``. Capability-test instead:
        // only collections expose ``isNode``; the core does not. So
        // ``typeof target.isNode !== 'function'`` reliably means
        // "the tap landed on empty canvas, deselect".
        const t = evt.target;
        if (!t || typeof t.isNode !== 'function') {
          this.deselect();
        }
      });
      // Escape key + body click outside the canvas also deselect.
      // The canvas-only tap handler can't see clicks outside its
      // container, so a global keydown is the reliable second path.
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && this.selected) {
          e.preventDefault();
          this.deselect();
        }
      });

      // Silky hover: lift the underlay padding briefly when the
      // cursor enters a node so it "blooms" without committing the
      // selection.
      this.cy.on('mouseover', 'node', (evt) => {
        const n = evt.target;
        if (!n.hasClass('hl')) {
          n.style('underlay-padding', 12);
          n.style('underlay-opacity', 0.55);
        }
        document.body.style.cursor = 'pointer';
      });
      this.cy.on('mouseout', 'node', (evt) => {
        const n = evt.target;
        if (!n.hasClass('hl')) {
          n.removeStyle('underlay-padding');
          n.removeStyle('underlay-opacity');
        }
        document.body.style.cursor = '';
      });

      // Detect edges by ``source`` presence -- Cytoscape auto-assigns
      // ``id`` to edges after init, so filtering by ``id !== undefined``
      // double-counts.
      const edgeCount = this.rawElements.filter(e => e.data.source !== undefined).length;
      const nodeCount = this.rawElements.length - edgeCount;
      this.stats = nodeCount + ' nodes / ' + edgeCount + ' edges';

      // SNAPSHOT the initial fcose positions so the "force" button
      // always returns to the same arrangement the user first saw.
      // Without this, subsequent "force" clicks after switching to
      // rings/tree/grid produce a different layout because fcose
      // (with randomize: false) relaxes from the current positions
      // -- not the original random seed.
      this._forceSnapshot = {};
      this.cy.nodes().forEach((n) => {
        const p = n.position();
        this._forceSnapshot[n.id()] = { x: p.x, y: p.y };
      });

      // v2.2 phase 4: chunked initial reveal. After the snapshot is
      // captured (so positions are final), hide every node, then
      // un-hide in batches of CHUNK_SIZE by descending degree. The
      // user sees the densest cluster of the graph appear first,
      // then the rest of the components fade in waves. Total reveal
      // time ~600-900ms depending on node count; far easier to
      // visually parse than "blank canvas -> 478 nodes at once".
      this._renderCanvasChunked();
    },

    // CHUNK_SIZE = 50 nodes per batch. Tuned for ~480-node graphs:
    // gives ~9 chunks at 80ms cadence = ~720ms full reveal, which
    // reads as "smoothly fast" without batches blurring together.
    // (See design doc § 4.)
    _renderCanvasChunked() {
      if (!this.cy) return;
      const reduced = typeof window.mnemoPrefersReducedMotion === 'function'
        && window.mnemoPrefersReducedMotion();
      if (reduced) {
        // Honor the a11y floor -- snap everything to visible at once.
        return;
      }

      const CHUNK = 50;
      const REVEAL_INTERVAL_MS = 80;
      const FADE_IN_DURATION_MS = 260;

      // Hide every node up front. Edges follow their endpoints in
      // cytoscape (opacity:0 nodes draw their edges invisibly too,
      // so we don't need to tag the edges explicitly).
      this.cy.batch(() => {
        this.cy.nodes().addClass('preload-hidden');
      });

      // Sort by degree DESC so the cluster center appears first.
      const sorted = this.cy.nodes()
        .toArray()
        .sort((a, b) => b.degree() - a.degree());
      const ids = sorted.map(n => n.id());

      // Schedule each chunk on a setTimeout cadence. Each chunk does
      // one cy.batch() so cytoscape only re-renders once per chunk.
      // ``.fade-in`` (CSS class on cytoscape nodes via class API) is
      // a no-op for the cytoscape canvas itself, but the layered
      // .fade-in animation in app.css lights up any DOM overlay that
      // mirrors these nodes (skeleton placeholders, future minimap).
      for (let i = 0; i < ids.length; i += CHUNK) {
        const slice = ids.slice(i, i + CHUNK);
        const chunkIdx = i / CHUNK;
        setTimeout(() => {
          if (!this.cy) return; // panel disposed mid-reveal
          this.cy.batch(() => {
            for (const id of slice) {
              const node = this.cy.getElementById(id);
              if (node && node.length) {
                node.removeClass('preload-hidden').addClass('fade-in');
              }
            }
          });
          // After the fade-in transition is "done", strip the class
          // so subsequent .dim/.hl class changes can't re-trigger an
          // opacity transition we don't want (the v2.1.2 lag fix).
          setTimeout(() => {
            if (!this.cy) return;
            this.cy.batch(() => {
              for (const id of slice) {
                const node = this.cy.getElementById(id);
                if (node && node.length) node.removeClass('fade-in');
              }
            });
          }, FADE_IN_DURATION_MS);
        }, chunkIdx * REVEAL_INTERVAL_MS);
      }
    },

    buildTree() {
      // Same source-presence trick as buildStats() -- detect nodes by
      // the ABSENCE of ``source`` so Cytoscape's auto-assigned edge ids
      // don't pollute the tree.
      const nodes = this.rawElements.filter(e => e.data.source === undefined && e.data.source_path);
      const root = { children: {}, isDir: true };
      // Modules only -- declarations are folded under their module.
      const modules = nodes.filter(n => n.data.type === 'code_module');
      const declCounts = {};
      for (const n of nodes) {
        if (n.data.type !== 'code_module' && n.data.source_path) {
          // Strip the line-range suffix to find the owning module path.
          const filePath = n.data.source_path.replace(/:\d+-\d+(#.+)?$/, '');
          declCounts[filePath] = (declCounts[filePath] || 0) + 1;
        }
      }
      for (const m of modules) {
        const path = (m.data.source_path || m.data.name).replace(/\\/g, '/');
        const parts = path.split('/').filter(Boolean);
        let cur = root;
        for (let i = 0; i < parts.length - 1; i++) {
          const seg = parts[i];
          if (!cur.children[seg]) cur.children[seg] = { children: {}, isDir: true };
          cur = cur.children[seg];
        }
        const leafName = parts[parts.length - 1];
        cur.children[leafName] = {
          isDir: false,
          id: m.data.id,
          label: leafName,
          childCount: declCounts[path] || 0,
        };
      }
      // Collapse single-child chains so deep paths render compactly:
      // src -> mnemo -> ui -> templates becomes src/mnemo/ui/templates.
      this._collapseTree(root);
      // Also: build a `.leaves` accessor on each directory level so
      // the template can iterate its files in one pass.
      this._annotateLeaves(root);
      this.treeRoot = root;
    },

    _collapseTree(node) {
      if (!node.isDir) return;
      for (const [name, child] of Object.entries(node.children)) {
        this._collapseTree(child);
        if (child.isDir) {
          const sub = Object.entries(child.children);
          if (sub.length === 1 && sub[0][1].isDir) {
            const [innerName, innerChild] = sub[0];
            delete node.children[name];
            node.children[name + '/' + innerName] = innerChild;
          }
        }
      }
    },

    _annotateLeaves(node) {
      if (!node.isDir) return;
      node.leaves = Object.entries(node.children)
        .filter(([_, c]) => !c.isDir)
        .map(([_, c]) => c);
      for (const c of Object.values(node.children)) this._annotateLeaves(c);
    },

    buildTypeFilters() {
      const types = new Set();
      for (const e of this.rawElements) {
        if (e.data.source === undefined && e.data.type) types.add(e.data.type);
      }
      this.nodeTypes = Array.from(types).sort();
      // Default: all on.
      for (const t of this.nodeTypes) {
        if (this.typeFilters[t] === undefined) this.typeFilters[t] = true;
      }
    },

    applyFilters() {
      if (!this.cy) return;
      const text = this.filterText.trim().toLowerCase();
      const minConf = this.minConfidence / 100;
      this.cy.batch(() => {
        this.cy.nodes().forEach(n => {
          const t = n.data('type');
          const matchesType = this.typeFilters[t] !== false;
          const matchesText = !text ||
            (n.data('name') || '').toLowerCase().includes(text) ||
            (t || '').toLowerCase().includes(text);
          if (matchesType && matchesText) n.removeClass('hide');
          else n.addClass('hide');
        });
        this.cy.edges().forEach(e => {
          const conf = e.data('confidence') ?? 1.0;
          const endpointsVisible =
            !e.source().hasClass('hide') && !e.target().hasClass('hide');
          if (conf >= minConf && endpointsVisible) e.removeClass('hide');
          else e.addClass('hide');
        });
      });
    },

    selectFromCanvas(node) {
      const d = { ...node.data() };
      this.selected = d;
      this.neighbors = [];

      // Stop any prior pulse loop before we touch the canvas.
      this._stopPulse();

      // v2.2.2: ALWAYS frame the selected node. Pre-v2.2.2 this
      // only happened on the file-tree click path (via focusNode);
      // direct canvas taps got no camera motion, so the selection
      // had no visible feedback beyond the side-panel update -- the
      // 6px ``_startPulse`` bloom on the node itself was too subtle
      // to see at typical zoom + the node could be in a corner.
      // Now every entry into selectFromCanvas frames the node:
      //   - pan: center it (always)
      //   - zoom: bump UP to 1.4 if currently lower, otherwise keep
      //           the user's current zoom (don't yank them OUT when
      //           they've zoomed in already).
      // Duration 350ms matches the file-tree path so the feel is
      // identical no matter how the click arrived.
      const currentZoom = this.cy.zoom();
      const targetZoom = Math.max(1.4, currentZoom);
      this.cy.animate(
        { center: { eles: node }, zoom: targetZoom },
        { duration: 350, easing: 'ease-out' },
      );

      // PERFORMANCE: batch class mutations so Cytoscape only
      // re-styles once. Without ``batch``, each ``.addClass`` on a
      // 1200-element graph forces a separate render pass.
      const neighborhood = node.closedNeighborhood();
      this.cy.batch(() => {
        this.cy.elements().removeClass('hl dim');
        // Dim only what's NOT in the neighborhood.
        this.cy.elements().not(neighborhood).addClass('dim');
        neighborhood.addClass('hl');
      });

      // Hydrate body from /v1/nodes/<id> -- defer the fetch a frame
      // so the click feels instant. The DOM updates from this.selected
      // happen on the next Alpine tick regardless.
      requestAnimationFrame(() => {
        fetch('/v1/nodes/' + d.id)
          .then((r) => (r.ok ? r.json() : null))
          .then((full) => {
            if (full && this.selected && this.selected.id === d.id) {
              this.selected = { ...this.selected, ...full };
            }
          })
          .catch(() => {});
      });

      // Build neighbors list (deduped by node id, keep best relation).
      const seen = {};
      node.connectedEdges().forEach((e) => {
        const other = e.source().id() === d.id ? e.target() : e.source();
        const od = other.data();
        const rel = e.data('relation');
        const conf = e.data('confidence') ?? 1.0;
        if (!seen[od.id] || conf > seen[od.id].confidence) {
          seen[od.id] = { id: od.id, name: od.name, type: od.type, rel, confidence: conf };
        }
      });
      this.neighbors = Object.values(seen);

      // PERFORMANCE: replace the old 60ms-tick setInterval pulse
      // (which re-styled the selected node + every highlighted edge
      // on every tick) with Cytoscape's own animation scheduler.
      // It uses requestAnimationFrame and only animates the ONE
      // selected node, not its edges.
      this._startPulse(node);
    },

    // v2.2.2: stronger, faster pulse so the "heart beat" is
    // unmistakeable. Pre-v2.2.2:
    //   peak: underlay-padding 20 (+6 from .hl), underlay-opacity 0.7 (+0.1)
    //   period: 900ms each leg = 1.8s/cycle  -> too subtle, too slow
    // Now:
    //   peak: underlay-padding 28 (+14 from .hl), underlay-opacity 0.95 (+0.35)
    //   period: 600ms each leg = 1.2s/cycle   -> reads as a clear heart beat
    _startPulse(node) {
      this._pulseNode = node;
      const cycle = () => {
        if (
          !this._pulseNode ||
          this._pulseNode !== node ||
          !this.selected ||
          this.selected.id !== node.id()
        ) {
          return;
        }
        node.animate(
          { style: { 'underlay-padding': 28, 'underlay-opacity': 0.95 } },
          {
            duration: 600,
            easing: 'ease-in-out',
            complete: () => {
              if (this._pulseNode !== node) return;
              node.animate(
                { style: { 'underlay-padding': 14, 'underlay-opacity': 0.6 } },
                { duration: 600, easing: 'ease-in-out', complete: cycle },
              );
            },
          },
        );
      };
      cycle();
    },

    _stopPulse() {
      // Just unsetting the guard flag wasn't enough: the in-flight
      // ``node.animate({...})`` tween kept running for up to 900ms and
      // its ``complete`` callback chained the next half of the cycle
      // before our flag check fired. The node would keep mutating
      // underlay-padding + underlay-opacity well after deselect.
      // ``node.stop(true, false)`` cancels the queued animations, and
      // ``removeStyle`` clears the inline styles the pulse set so the
      // base selector takes over again.
      if (this._pulseNode) {
        try {
          this._pulseNode.stop(true, false);
          this._pulseNode.removeStyle('underlay-padding underlay-opacity');
        } catch (_) { /* node may have been removed; ignore */ }
      }
      this._pulseNode = null;
    },

    deselect() {
      // ORDER MATTERS:
      //   1. Stop the pulse first so its in-flight animate() chain
      //      doesn't keep rewriting underlay styles AFTER we clear
      //      classes (which would re-trigger redraws).
      //   2. ``cy.elements().stop(true, false)`` cancels any other
      //      queued animations (e.g. the camera pan that
      //      selectFromCanvas may have started).
      //   3. Then the bulk removeClass inside cy.batch() -- one
      //      Cytoscape redraw for the lot.
      // The combined effect is that deselect on a 470+ node graph
      // returns control synchronously in ~5-15ms and there are no
      // lingering tweens to chew frames afterwards.
      this._stopPulse();
      if (this.cy) {
        this.cy.elements().stop(true, false);
        this.cy.batch(() => this.cy.elements().removeClass('hl dim'));
      }
      this.selected = null;
      this.neighbors = [];
    },

    fileExt(name) {
      const m = (name || '').toLowerCase().match(/\.([a-z0-9]+)$/);
      return m ? m[1] : 'unknown';
    },

    fileIcon(name) {
      // VSCode-style file icons via inline SVG. Each language gets a
      // small "page" glyph with a colored corner accent. Returns
      // raw SVG markup for x-html.
      const ext = this.fileExt(name);
      const color = ({
        py: '#3776ab', pyi: '#3776ab',
        js: '#f7df1e', mjs: '#f7df1e', cjs: '#f7df1e', jsx: '#f7df1e',
        ts: '#3178c6', tsx: '#3178c6',
        go: '#00add8',
        rs: '#dea584', java: '#b07219', kt: '#a97bff',
        rb: '#cc342d', php: '#777bb4',
        cs: '#178600', swift: '#fa7343',
        c: '#555555', h: '#888888', cpp: '#f34b7d', hpp: '#888888',
        json: '#fbbf24', yaml: '#cb171e', yml: '#cb171e', toml: '#9c4221',
        md: '#5fa8ff', sh: '#89e051', bash: '#89e051',
        html: '#e34c26', css: '#264de4',
      })[ext] || '#94a3b8';
      // Page glyph + colored fold corner. Keeps a consistent silhouette
      // across types while the corner color signals language at a glance.
      return (
        '<svg viewBox="0 0 16 16" class="vscode-icon">' +
        '<path fill="#2a3340" d="M3 1.5h6.5L13 5v9.5H3z"/>' +
        '<path fill="' + color + '" d="M9.5 1.5L13 5h-3.5z"/>' +
        '</svg>'
      );
    },

    bodyLanguage(sourcePath) {
      // Map a source_path's file extension to a Prism language hint.
      // Returns "none" for paths without a recognized extension --
      // Prism just leaves those as plain text, no error.
      if (!sourcePath) return 'none';
      const clean = sourcePath.replace(/:\d+-\d+(#.+)?$/, '').toLowerCase();
      const m = clean.match(/\.([a-z0-9]+)$/);
      if (!m) return 'none';
      const ext = m[1];
      return ({
        py: 'python', pyi: 'python',
        js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'jsx',
        ts: 'typescript', tsx: 'tsx',
        go: 'go',
        rs: 'rust',
        java: 'java', kt: 'kotlin',
        rb: 'ruby', php: 'php',
        cs: 'csharp',
        swift: 'swift',
        c: 'c', h: 'c', cpp: 'cpp', hpp: 'cpp', cc: 'cpp',
        json: 'json', yaml: 'yaml', yml: 'yaml', toml: 'toml',
        md: 'markdown', sh: 'bash', bash: 'bash',
        html: 'html', css: 'css', scss: 'scss',
        gd: 'gdscript',
      })[ext] || 'none';
    },

    focusNode(id) {
      if (!this.cy) return;
      const target = this.cy.getElementById(id);
      if (!target || target.length === 0) {
        // Node isn't in the current view -- reload with that as focus.
        this.contextNodeId = id;
        this.reload();
        return;
      }
      // v2.2.2: selectFromCanvas now owns the camera pan+zoom for
      // ALL entry paths -- this used to be duplicated here.
      this.selectFromCanvas(target);
    },

    relayout(name) {
      if (!this.cy) return;
      this.currentLayout = name;
      // Operate on visible elements only -- a layout run on hidden
      // nodes wastes work and produces a sparse result when most of
      // the graph is filtered out.
      const visible = this.cy.elements().not('.hide');

      // SMOOTHNESS without LAG: fade nodes to 0.3 opacity, snap to
      // the new positions, fade back to 1.0 + animate the camera.
      // The user perceives a soft cross-fade instead of jank or a
      // hard cut.
      const fadeIn = () => {
        this.cy.elements().animate(
          { style: { opacity: 1 } },
          { duration: 220, easing: 'ease-out' },
        );
      };

      // CONSISTENT FORCE LAYOUT: snapshot the initial fcose
      // positions on first run and restore them when the user
      // returns to "force". Without this, switching to rings/tree
      // then back to force converges to a different layout because
      // fcose with randomize: false relaxes from the current
      // (non-force) positions.
      //
      // The layout name passed in here is the cytoscape plugin
      // name (``fcose``) -- NOT the user-facing button label
      // (``force``). Earlier versions checked ``name === 'force'``,
      // which never matched, so the snapshot branch was dead code
      // and every "force" click after a layout switch produced a
      // fresh re-relax from the current positions.
      if (name === 'fcose' && this._forceSnapshot) {
        const snap = this._forceSnapshot;
        this.cy.batch(() => {
          visible.nodes().forEach((n) => {
            const p = snap[n.id()];
            if (p) n.position(p);
          });
        });
        this.cy.animate(
          { fit: { eles: visible, padding: 60 } },
          { duration: 320, easing: 'ease-out' },
        );
        fadeIn();
        return;
      }

      // PERFORMANCE: interpolating positions over 400ms for 400+
      // nodes is the lag source. Snap synchronously inside cy.batch
      // and animate only the camera.
      const baseOpts = { animate: false, padding: 40, fit: false };
      const perLayout = {
        fcose: {
          nodeRepulsion: 6500,
          idealEdgeLength: 90,
          randomize: false,
        },
        concentric: {
          // Higher-degree nodes go in the inner ring -- "rings" puts
          // hubs at the center, leaves at the edge.
          concentric: (n) => n.degree(),
          levelWidth: () => 1,
          minNodeSpacing: 28,
        },
        breadthfirst: {
          directed: true,
          spacingFactor: 1.2,
          // RADIAL fan around each component's root rather than the
          // default row-by-row layout. With a typical code graph the
          // row layout collapses to a straight horizontal line
          // because most nodes have only one or two siblings per
          // BFS level; circle: true turns each tree into a fan.
          circle: true,
          // One root per connected component, picked as the highest-
          // degree node in that component. Without this, BFS only
          // walks the seed's component and dumps everything else into
          // a leftover row -- the "straight line" the user saw.
          roots: (() => {
            const ids = [];
            visible.components().forEach((comp) => {
              let best = null;
              let max = -1;
              comp.nodes().forEach((n) => {
                const d = n.degree();
                if (d > max) {
                  max = d;
                  best = n;
                }
              });
              if (best) ids.push(best.id());
            });
            return ids;
          })(),
          // Squeeze siblings closer to the root so each fan has
          // visible structure rather than a single dense ring.
          avoidOverlap: true,
          avoidOverlapPadding: 12,
        },
        grid: {
          condense: true,
          avoidOverlap: true,
          avoidOverlapPadding: 16,
        },
      };
      const opts = { name, ...baseOpts, ...(perLayout[name] || {}) };
      // Fade out before snapping so the position change isn't a
      // hard cut; the silky cross-fade hides the absence of
      // per-node tweening.
      this.cy.elements().animate(
        { style: { opacity: 0.3 } },
        { duration: 140, easing: 'ease-in' },
      );
      // Run the layout inside a Cytoscape batch -- the per-node
      // position updates fire a single render pass instead of one
      // per node.
      this.cy.batch(() => {
        visible.layout(opts).run();
      });
      // Animate ONLY the camera to fit the new positions. That's
      // one tween (the viewport) instead of N tweens (one per node)
      // -- silky transition without the per-node redraw cost.
      this.cy.animate(
        { fit: { eles: visible, padding: 60 } },
        { duration: 320, easing: 'ease-out' },
      );
      fadeIn();
    },

    copyCitation() {
      if (!this.selected) return;
      const cite = '[mnemo:' + this.selected.id + ']';
      navigator.clipboard.writeText(cite).then(() => {
        window.toast('Citation copied: ' + cite, 'success');
      }).catch(e => window.toast('Copy failed: ' + e, 'error'));
    },

    // --- Resizer logic -------------------------------------------------
    startResize(evt, side) {
      this.dragging = side;
      evt.preventDefault();
      const shell = document.querySelector('.nebula-shell');
      const start = evt.clientX;
      const startLeft = parseInt(getComputedStyle(shell).getPropertyValue('--nebula-left') || '240', 10);
      const startRight = parseInt(getComputedStyle(shell).getPropertyValue('--nebula-right') || '320', 10);

      const onMove = (e) => {
        const dx = e.clientX - start;
        if (side === 'left') {
          const w = Math.max(160, Math.min(420, startLeft + dx));
          shell.style.setProperty('--nebula-left', w + 'px');
          localStorage.setItem('nebula.left', w + 'px');
        } else {
          const w = Math.max(220, Math.min(520, startRight - dx));
          shell.style.setProperty('--nebula-right', w + 'px');
          localStorage.setItem('nebula.right', w + 'px');
        }
      };
      const onUp = () => {
        this.dragging = null;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        if (this.cy) this.cy.resize();
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    },
  };
}
</script>
{% endblock %}
